name: Daily Snapshot

on:
  # Daily at 11pm UTC (~7pm ET). Captures each day's state so post-raid
  # recaps have a tight diff window. History files are small and GitHub
  # storage is generous, so daily is fine long-term.
  schedule:
    - cron: '0 23 * * *'

  # Manual trigger for testing and backfills.
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily snapshot
        run: node snapshot-week.js

      - name: Generate recap
        run: node generate-recap.js

      - name: Commit and push snapshot and recap
        run: |
          git config user.name "Guild Hub Bot"
          git config user.email "bot@guild-hub.github.io"
          git add history/*.json recap.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Daily snapshot + recap"
            git pull --rebase origin main
            git push
          fi
