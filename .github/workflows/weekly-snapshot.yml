name: Daily Snapshot

on:
  # Daily at 11pm UTC (~7pm ET). Captures each day's state so post-raid
  # recaps have a tight diff window. History files are small and GitHub
  # storage is generous, so daily is fine long-term.
  schedule:
    - cron: '0 23 * * *'

  # Manual trigger for testing and backfills.
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily snapshot
        run: node snapshot-week.js

      - name: Generate recap
        run: node generate-recap.js

      - name: Commit snapshot and recap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily snapshot + recap"
          file_pattern: "history/*.json recap.json"
          commit_user_name: "Guild Hub Bot"
          commit_user_email: "bot@guild-hub.github.io"
