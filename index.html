}

// ═══════════════════════════════════════
// TAB 5: INSIGHTS
// ═══════════════════════════════════════
function renderInsights(){
  const container = h("div");
  
  const DIFF_NAMES = {3: 'Normal', 4: 'Heroic', 5: 'Mythic'};
  const DIFF_COLORS = {3: '#1eff00', 4: '#a335ee', 5: '#ff8000'};
  
  // Check if we have any WCL data
  if(!wclDataCache || !wclDataCache.difficulties){
    return h("div", {class: "empty"}, 
      h("div", {style: {marginBottom: "12px"}}, "No raid data loaded yet"),
      h("div", {style: {fontSize: "13px", color: "var(--faint)"}}, "Raid parse data will load automatically")
    );
  }
  
  // Header with difficulty toggle
  const header = h("div", {style: {
    padding: "16px 20px",
    background: "var(--card)",
    borderRadius: "12px",
    marginBottom: "20px",
    border: "1px solid var(--border)",
    display: "flex",
    alignItems: "center",
    justifyContent: "space-between",
    flexWrap: "wrap",
    gap: "12px"
  }},
    h("div", {},
      h("div", {style: {fontSize: "16px", fontWeight: "700", marginBottom: "2px"}}, "Raid Insights"),
      h("div", {style: {fontSize: "12px", color: "var(--muted)"}}, "Analysis based on " + DIFF_NAMES[selectedDifficulty] + " parses")
    ),
    h("div", {style: {display: "flex", gap: "8px"}},
      ...[3, 4, 5].map(diffId => {
        const isActive = selectedDifficulty === diffId;
        const hasData = wclDataCache.difficulties?.[diffId]?.raiders?.length > 0;
        return h("button", {
          onclick: () => {
            if(hasData && selectedDifficulty !== diffId){
              selectedDifficulty = diffId;
              raidParseCache = wclDataCache.difficulties[diffId].raiders;
              // Update header avg parse
              const headerParse = document.getElementById("header-avg-parse");
              const newStats = wclDataCache.difficulties[diffId].stats;
              if(headerParse && newStats){
                headerParse.textContent = newStats.guildAvg + "%";
                headerParse.style.color = parseColor(newStats.guildAvg);
              }
              render();
            }
          },
          style: {
            padding: "6px 12px",
            borderRadius: "6px",
            border: "none",
            background: isActive ? DIFF_COLORS[diffId] : "rgba(255,255,255,0.1)",
            color: isActive ? "#000" : (hasData ? "var(--text)" : "var(--muted)"),
            fontSize: "11px",
            fontWeight: "700",
            cursor: hasData ? "pointer" : "not-allowed",
            opacity: hasData ? 1 : 0.5,
            transition: "all 0.2s"
          }
        }, DIFF_NAMES[diffId].toUpperCase());
      })
    )
  );
  container.appendChild(header);
  
  // Get data for selected difficulty
  const diffData = wclDataCache.difficulties[selectedDifficulty];
  if(!diffData || !diffData.raiders || diffData.raiders.length === 0){
    container.appendChild(h("div", {class: "empty"}, 
      h("div", {style: {marginBottom: "12px"}}, "No data for " + DIFF_NAMES[selectedDifficulty]),
      h("div", {style: {fontSize: "13px", color: "var(--faint)"}}, "Try selecting a different difficulty")
    ));
    return container;
  }
  
  const data = diffData.raiders;
  
  // Calculate insights
  
  // 1. Boss Difficulty - average parse per boss
  const bossStats = {};
  for(const raider of data){
    for(const boss of raider.bosses){
      if(!bossStats[boss.name]){
        bossStats[boss.name] = {name: boss.name, parses: [], total: 0, count: 0};
      }
      bossStats[boss.name].parses.push(boss.parse);
      bossStats[boss.name].total += boss.parse;
      bossStats[boss.name].count++;
    }
  }
  const bossList = Object.values(bossStats).map(b => ({
    name: b.name,
    avg: Math.floor(b.total / b.count),
    kills: b.count
  })).sort((a, b) => a.avg - b.avg);
  
  // 2. Spec Leaderboard
  const specStats = {};
  for(const raider of data){
    for(const boss of raider.bosses){
      if(!boss.spec) continue;
      if(!specStats[boss.spec]){
        specStats[boss.spec] = {spec: boss.spec, total: 0, count: 0};
      }
      specStats[boss.spec].total += boss.parse;
      specStats[boss.spec].count++;
    }
  }
  const specList = Object.values(specStats).map(s => ({
    spec: s.spec,
    avg: Math.floor(s.total / s.count),
    parses: s.count
  })).sort((a, b) => b.avg - a.avg);
  
  // 3. Most 99s (pink parse kings)
  const pinkCounts = data.map(r => ({
    name: r.name,
    class: r.class,
    pinks: r.bosses.filter(b => b.parse >= 99).length
  })).filter(r => r.pinks > 0).sort((a, b) => b.pinks - a.pinks);
  
  // 4. Most Consistent (smallest range between best and worst)
  const consistency = data.filter(r => r.bosses.length >= 3).map(r => {
    const parses = r.bosses.map(b => b.parse);
    const max = Math.max(...parses);
    const min = Math.min(...parses);
    return {
      name: r.name,
      class: r.class,
      range: max - min,
      avg: r.avgParse
    };
  }).sort((a, b) => a.range - b.range);
  
  // 5. Boss Coverage - who has killed the most bosses
  const coverage = data.map(r => ({
    name: r.name,
    class: r.class,
    bosses: r.bossCount
  })).sort((a, b) => b.bosses - a.bosses);
  
  // Render insights grid
  container.appendChild(h("div", {class: "sec"}, "RAID INSIGHTS"));
  
  const grid = h("div", {class: "insights-grid"});
  
  // Boss Difficulty Card
  grid.appendChild(h("div", {class: "insight-card", style: {borderLeftColor: "#f87171"}},
    h("div", {class: "insight-title", style: {color: "#f87171"}},
      h("span", {class: "insight-emoji"}, "🎯"),
      h("span", null, "Toughest Bosses")
    ),
    h("div", {class: "insight-body"}, "Bosses where the guild is parsing lowest on average"),
    h("div", {class: "insight-grid"},
      ...bossList.slice(0, 4).map(b => h("div", {class: "insight-item"},
        h("div", {class: "insight-item-name"}, shortBoss(b.name)),
        h("div", {class: "insight-item-stat", style: {color: parseColor(b.avg)}}, b.avg + "% avg")
      ))
    )
  ));
  
  // Spec Leaderboard Card
  grid.appendChild(h("div", {class: "insight-card", style: {borderLeftColor: "#a335ee"}},
    h("div", {class: "insight-title", style: {color: "#a335ee"}},
      h("span", {class: "insight-emoji"}, "⚔️"),
      h("span", null, "Top Specs")
    ),
    h("div", {class: "insight-body"}, "Highest performing specs across all boss kills"),
    h("div", {class: "insight-grid"},
      ...specList.slice(0, 6).map(s => h("div", {class: "insight-item"},
        h("div", {class: "insight-item-name"}, shortSpec(s.spec) || s.spec),
        h("div", {class: "insight-item-stat", style: {color: parseColor(s.avg)}}, s.avg + "% avg")
      ))
    )
  ));
  
  // Pink Parse Kings Card
  if(pinkCounts.length > 0){
    grid.appendChild(h("div", {class: "insight-card", style: {borderLeftColor: "#e268a8"}},
      h("div", {class: "insight-title", style: {color: "#e268a8"}},
        h("span", {class: "insight-emoji"}, "👑"),
        h("span", null, "Pink Parse Kings")
      ),
      h("div", {class: "insight-body"}, "Raiders with the most 99+ parses"),
      h("div", {class: "insight-grid"},
        ...pinkCounts.slice(0, 6).map(r => h("div", {class: "insight-item"},
          h("div", {class: "insight-item-name", style: {color: classColors[r.class] || "var(--text)"}}, r.name),
          h("div", {class: "insight-item-stat"}, r.pinks + " pink" + (r.pinks > 1 ? "s" : ""))
        ))
      )
    ));
  }
  
  // Most Consistent Card
  if(consistency.length > 0){
    grid.appendChild(h("div", {class: "insight-card", style: {borderLeftColor: "#4ade80"}},
      h("div", {class: "insight-title", style: {color: "#4ade80"}},
        h("span", {class: "insight-emoji"}, "📊"),
        h("span", null, "Most Consistent")
      ),
      h("div", {class: "insight-body"}, "Smallest gap between best and worst parse (3+ bosses)"),
      h("div", {class: "insight-grid"},
        ...consistency.slice(0, 6).map(r => h("div", {class: "insight-item"},
          h("div", {class: "insight-item-name", style: {color: classColors[r.class] || "var(--text)"}}, r.name),
          h("div", {class: "insight-item-stat"}, "±" + r.range + " range")
        ))
      )
    ));
  }
  
  // Boss Coverage Card
  const diffLetter = {3: 'N', 4: 'H', 5: 'M'}[selectedDifficulty] || 'H';
  grid.appendChild(h("div", {class: "insight-card", style: {borderLeftColor: "var(--accent)"}},
    h("div", {class: "insight-title", style: {color: "var(--accent)"}},
      h("span", {class: "insight-emoji"}, "📈"),
      h("span", null, "Most Boss Kills")
    ),
    h("div", {class: "insight-body"}, "Raiders with the most logged boss kills"),
    h("div", {class: "insight-grid"},
      ...coverage.slice(0, 6).map(r => h("div", {class: "insight-item"},
        h("div", {class: "insight-item-name", style: {color: classColors[r.class] || "var(--text)"}}, r.name),
        h("div", {class: "insight-item-stat"}, r.bosses + "/9 " + diffLetter)
      ))
    )
  ));
  
  // Easy Bosses Card (flip side of tough bosses - celebratory!)
  grid.appendChild(h("div", {class: "insight-card", style: {borderLeftColor: "#1eff00"}},
    h("div", {class: "insight-title", style: {color: "#1eff00"}},
      h("span", {class: "insight-emoji"}, "💪"),
      h("span", null, "Guild Stompers")
    ),
    h("div", {class: "insight-body"}, "Bosses where the guild absolutely dominates"),
    h("div", {class: "insight-grid"},
      ...bossList.slice().reverse().slice(0, 4).map(b => h("div", {class: "insight-item"},
        h("div", {class: "insight-item-name"}, shortBoss(b.name)),
        h("div", {class: "insight-item-stat", style: {color: parseColor(b.avg)}}, b.avg + "% avg")
      ))
    )
  ));
  
  container.appendChild(grid);
  
  return container;
}

      loadingEl.style.display = "none";
      renderRaidersFromCache(wclDataCache);
      return;
    }
    
    // Fallback to live fetching if no cache
    console.log('No WCL cache for difficulty', difficultyState.current, ', fetching live...');
    
    if(!S.chars || S.chars.length === 0){
      loadingEl.innerHTML = "No guild roster loaded";
      return;
    }
    
    // Filter actual raiders (level 90, has raid kills)
    const raiders = S.chars.filter(c => {
      if(c.level < 90) return false;
      const r = c.raid_progression?.[RAID_TIER];
      return r && raidScore(r) > 0;
    });
    
    console.log(`Loading raid data for ${raiders.length} raiders at difficulty ${difficultyState.current}...`);
    
    const raidersWithParses = [];
    
    for(let i = 0; i < raiders.length; i++){
      const char = raiders[i];
      console.log(`[${i+1}/${raiders.length}] Fetching ${char.name}...`);
      
      loadingEl.textContent = `Loading ${char.name}... (${i+1}/${raiders.length})`;
      
      // Fetch character rankings
      const serverSlug = (char.realm || 'stormrage').toLowerCase();
      console.log(`  Fetching ${char.name} from server: ${serverSlug}`);
      const zoneRankings = await fetchCharacterZoneRankings(char.name, serverSlug, 'US');
      
      console.log(`  ${char.name} zoneRankings response:`, zoneRankings);
      
      if(!zoneRankings || !zoneRankings.rankings){
        console.log(`  No rankings for ${char.name}`);
        continue;
      }
      
      console.log(`  ${char.name}: WCL returned difficulty ${zoneRankings.difficulty}, we want ${difficultyState.current}`);
      
      // Check if this is the difficulty we want
      if(zoneRankings.difficulty !== difficultyState.current){
        console.log(`  Skipping ${char.name} - wrong difficulty`);
        continue;
      }
      
      // Filter out bosses with no parse
      const rankings = zoneRankings.rankings.filter(r => r.rankPercent);
      
      if(rankings.length === 0){
        console.log(`  No valid parses for ${char.name}`);
        continue;
      }
      
      console.log(`  Found ${rankings.length} bosses for ${char.name}`);
      
      // Calculate average
      const avgParse = Math.floor(rankings.reduce((s, r) => s + r.rankPercent, 0) / rankings.length);
      
      raidersWithParses.push({
        name: char.name,
        class: char.class,
        realm: serverSlug,
        avgParse: avgParse,
        bossCount: rankings.length,
        bosses: rankings.map(r => ({
          name: r.encounter.name,
          encounterID: r.encounter.id,
          parse: Math.floor(r.rankPercent),
          spec: r.spec,
          dps: r.bestAmount
        }))
      });
      
      await sleep(200); // Rate limit

    loadingEl.style.display = "none";

              );
            } else {
              // No kill - show grey square with just boss name
              return h("div", {
                style: {
                  padding: "10px 12px",
                  borderRadius: "8px",
                  background: "rgba(255,255,255,0.05)",
                  border: "1px solid rgba(255,255,255,0.1)",
                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  justifyContent: "center",
                  minWidth: "90px",
                  minHeight: "62px",
                  gap: "2px"
                }
              },
                h("div", {style: {
                  fontSize: "10px",
                  fontWeight: "600",
                  color: "rgba(255,255,255,0.3)",
                  textAlign: "center"
                }}, raidBoss.short),
                h("div", {style: {
                  fontSize: "11px",
                  fontWeight: "500",
                  color: "rgba(255,255,255,0.15)",
                  textAlign: "center"
                }}, "No kill")
              );
            }
          })
        )
      );
      
      dataEl.appendChild(card);
    }
  }
  
  // Auto-load on render
  setTimeout(loadRaidData, 100);
  
  return container;
}

function formatDps(n){
  if(!n) return "";
  if(n >= 1000000) return (n/1000000).toFixed(1) + "m";
  if(n >= 1000) return (n/1000).toFixed(1) + "k";
  return Math.floor(n).toString();
}

// Clean character names - removes server IDs like "Name-123456789"
function cleanName(name){
  if(!name) return "";
  // If name has a hyphen followed by only numbers, strip it
  return name.replace(/-\d+$/, "");
}

function shortSpec(s){
  if(!s) return "";
  const abbrevs = {
    "Retribution": "Ret", "Protection": "Prot", "Holy": "Holy",
    "Frost": "Frost", "Fire": "Fire", "Arcane": "Arc",
    "Arms": "Arms", "Fury": "Fury",
    "Assassination": "Sin", "Outlaw": "Outlaw", "Subtlety": "Sub",
    "Beast Mastery": "BM", "Marksmanship": "MM", "Survival": "Surv",
    "Elemental": "Ele", "Enhancement": "Enh", "Restoration": "Resto",
    "Balance": "Bal", "Feral": "Feral", "Guardian": "Guard",
    "Shadow": "Shadow", "Discipline": "Disc",
    "Affliction": "Aff", "Demonology": "Demo", "Destruction": "Destro",
    "Blood": "Blood", "Unholy": "UH",
    "Brewmaster": "Brew", "Windwalker": "WW", "Mistweaver": "MW",
    "Havoc": "Havoc", "Vengeance": "Veng",
    "Devastation": "Dev", "Preservation": "Pres", "Augmentation": "Aug"
  };
  return abbrevs[s] || s.substring(0, 4);
}

function shortBoss(name){
  if(!name) return "";
  const cleaned = name.replace(/^(The |Imperator |High |Lord |Lady |King |Queen |Prince |Princess |General |Commander |Archbishop )/i, "");
  const firstWord = cleaned.split(" ")[0];
  return firstWord.length > 10 ? firstWord.substring(0, 9) + "…" : firstWord;
}

function parseColor(p){
  if(p >= 99) return "#e268a8"; // Pink
  if(p >= 95) return "#a335ee"; // Purple
  if(p >= 75) return "#0070dd"; // Blue
  if(p >= 50) return "#1eff00"; // Green
  return "rgba(255,255,255,0.5)"; // Gray
}
// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(S.status==="error"){app.appendChild(h("div",{class:"err"},h("div",{class:"msg"},"Failed to load"),h("div",{class:"detail"},S.error),h("button",{onclick:()=>loadAll()},"Retry")));return;}
  if(S.status!=="done"){
    app.appendChild(h("div",{class:"loading"},
      h("div",{class:"brand"},h("div",{class:"brand-r"},"RFB"),h("div",{class:"brand-h"},"Hub")),
      h("div",{class:"sub",style:{marginTop:"12px"}},S.status==="guild"?"Fetching guild roster...":"Loading "+S.progress[0]+"/"+S.progress[1]),
      S.progress[1]>0?h("div",{class:"pbar"},h("div",{class:"pfill",style:{width:(S.progress[0]/S.progress[1]*100)+"%"}})):null
    ));return;
  }
  const gr=S.guild?.raid_progression?.[RAID_TIER];
  
  // Filter for ACTUAL RAIDERS: level 90 and has raid kills
  const actualRaiders=S.chars.filter(c=>{
    if(c.level<90)return false;
    const r=c.raid_progression?.[RAID_TIER];
    if(!r||raidScore(r)===0)return false;
    return true;
  });
  
  const raidersN=actualRaiders.length;
  const avgRio=Math.round(actualRaiders.reduce((s,c)=>s+(c.mythic_plus_scores_by_season?.[0]?.scores?.all||0),0)/Math.max(1,actualRaiders.length))||0;
  
  // Calculate avg ilvl
  const avgIlvl=Math.round(actualRaiders.reduce((s,c)=>s+(c.gear?.item_level_equipped||0),0)/Math.max(1,actualRaiders.length))||0;

  app.appendChild(h("div",{class:"header"},
    h("div",{class:"h-row"},
      h("div",{class:"brand"},h("div",{class:"brand-r"},"RFB"),h("div",{class:"brand-h"},"Hub")),
      h("div",{class:"g-info"},
        h("div",{class:"g-name"},S.guild?.name||G_N),
        h("div",{class:"g-sub"},G_S+"-"+G_R.toUpperCase()+" · Midnight S1 · "+(gr?.summary||""))
      ),
      h("button",{class:"refresh",onclick:function(){S={status:"idle",progress:[0,0],guild:null,chars:[],tab:S.tab,error:null};render();loadAll();}},"↻ Refresh")
    ),
    h("div",{class:"h-stats"},
      h("div",{class:"h-stat"},h("div",{class:"v"},""+raidersN),h("div",{class:"l"},"RAIDERS")),
      h("div",{class:"h-stat"},h("div",{class:"v"},""+(avgRio||"-")),h("div",{class:"l"},"AVG R.IO")),
      h("div",{class:"h-stat"},h("div",{class:"v"},""+(avgIlvl||"-")),h("div",{class:"l"},"AVG ILVL")),
      h("div",{class:"h-stat"},h("div",{class:"v",id:"header-avg-parse"},"-"),h("div",{class:"l"},"AVG PARSE"))
    )
  ));
  
  // Immediately set AVG PARSE from cache if available
  if(wclDataCache && wclDataCache.difficulties){
    const diffData = wclDataCache.difficulties[selectedDifficulty];
    if(diffData && diffData.stats){
      const hp = document.getElementById("header-avg-parse");
      if(hp){
        hp.textContent = diffData.stats.guildAvg + "%";
        hp.style.color = parseColor(diffData.stats.guildAvg);
      }
    }
  }
  
  const tabNames=["Power Rankings","Raid Logs","Keystone Progress","Gear Check","Insights"];
  app.appendChild(h("div",{class:"tabs"},...tabNames.map((t,i)=>h("button",{class:"tab "+(S.tab===i?"active":""),onclick:()=>set({tab:i})},t))));
  const content=h("div",{class:"content"});
  if(S.tab===0)content.appendChild(renderPower());
  else if(S.tab===1){
    try{
      content.appendChild(renderRaidLogsNew());
    }catch(e){
      console.error('renderRaidLogs error:', e);
      content.appendChild(h("div",{class:"empty"},
        h("div",{style:{marginBottom:"12px"}},"Error loading raid logs"),
        h("div",{style:{fontSize:"13px",color:"var(--faint)"}},e.toString())
      ));
    }
  }
  else if(S.tab===2)content.appendChild(renderKeys());
  else if(S.tab===3)content.appendChild(renderGear());
  else if(S.tab===4)content.appendChild(renderInsights());
  app.appendChild(content);
  app.appendChild(h("div",{class:"footer"},"RFB HUB \u00b7 LIVE VIA RAIDER.IO"));
}
render();loadAll();
</script>
