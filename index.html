<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFB Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:rgba(255,255,255,0.028);--border:rgba(255,255,255,0.07);--accent:#FF9900;--accent-dim:rgba(255,153,0,0.12);--accent-bg:rgba(255,153,0,0.06);--text:#f1f1f1;--muted:rgba(255,255,255,0.35);--faint:rgba(255,255,255,0.15)}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}

/* ── HEADER ── */
.header{background:linear-gradient(180deg,rgba(255,153,0,0.04) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:24px 36px 20px}
.h-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:0;user-select:none}
.brand-r{background:var(--accent);color:#000;font-size:22px;font-weight:900;padding:4px 10px 4px 12px;border-radius:8px 0 0 8px;line-height:1.1}
.brand-h{background:#1a1a1a;color:#fff;font-size:22px;font-weight:700;padding:4px 12px 4px 10px;border-radius:0 8px 8px 0;line-height:1.1;border:1px solid rgba(255,255,255,0.1);border-left:none}
.g-info{margin-left:12px}
.g-name{font-size:18px;font-weight:600;color:var(--text)}
.g-sub{font-size:12px;color:var(--muted);font-weight:400}
.refresh{padding:7px 16px;border-radius:8px;border:1px solid rgba(255,153,0,0.25);background:transparent;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-left:auto;transition:all .15s}
.refresh:hover{background:var(--accent-dim)}
.h-stats{display:flex;gap:28px;flex-wrap:wrap}
.h-stat .v{font-size:22px;font-weight:800}
.h-stat .l{font-size:9px;color:var(--faint);letter-spacing:1.5px;margin-top:1px;font-weight:600}

/* ── TABS ── */
.tabs{display:flex;gap:6px;padding:18px 36px 0;border-bottom:1px solid var(--border);padding-bottom:12px}
.tab{padding:8px 20px;border-radius:20px;border:none;cursor:pointer;font-size:14px;font-weight:600;background:transparent;color:rgba(255,255,255,0.3);transition:all .15s;font-family:inherit}
.tab:hover{color:rgba(255,255,255,0.5)}
.tab.active{background:var(--accent);color:#000}

.content{padding:24px 36px 60px;max-width:1200px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:10px;transition:border-color .15s}
.card:hover{border-color:rgba(255,255,255,0.12)}

/* ── SUMMARY ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.s-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.s-box .n{font-size:36px;font-weight:900;line-height:1}
.s-box .l{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.5px;font-weight:500}
.s-box.green .n{color:#4ade80} .s-box.red .n{color:#f87171} .s-box.gold .n{color:var(--accent)} .s-box.blue .n{color:#60a5fa}

/* ── SECTION ── */
.sec{font-size:12px;font-weight:700;color:var(--faint);letter-spacing:1.5px;margin:24px 0 12px 2px}

/* ── TAGS ── */
.tg{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;white-space:nowrap;display:inline-block}
.tg.bad{background:rgba(248,113,113,0.12);color:#fca5a5}
.tg.good{background:rgba(74,222,128,0.1);color:#86efac}
.tg.warn{background:rgba(251,191,36,0.1);color:#fde68a}
.tg.tier{background:rgba(255,153,0,0.1);color:#ffb84d;font-weight:700}
.tg.io{border-radius:6px;font-weight:700;padding:3px 10px}

/* ── KEY SQUARES ── */
.ksq{box-sizing:border-box;width:26px;min-width:26px;height:20px;border-radius:4px;font-size:10px;font-weight:700;cursor:default;position:relative;display:flex;align-items:center;justify-content:center;flex:0 0 26px}
.ksq.empty{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.08)}
.ksq .tt{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:5px 10px;font-size:11px;white-space:nowrap;pointer-events:none;z-index:10;opacity:0;transition:opacity .12s;font-weight:500}
.ksq:hover .tt{opacity:1}

/* ── M+ GRID ── */
.grid-wrap{overflow-x:auto;margin-bottom:16px}
.grid-wrap table{width:100%;border-collapse:collapse;font-size:13px}
.grid-wrap th{padding:10px 6px;text-align:center;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
.grid-wrap th:first-child{text-align:left;min-width:140px}
.grid-wrap td{padding:7px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.025)}
.grid-wrap td:first-child{text-align:left;font-weight:600;font-size:14px}
.grid-wrap tr:hover{background:rgba(255,255,255,0.02)}
.grid-cell{width:36px;height:26px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin:0 auto}
.grid-cell.empty{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.08)}

/* ── FILTER ── */
.frow{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.fbtn{padding:6px 16px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.3);font-family:inherit;transition:all .15s}
.fbtn:hover{color:rgba(255,255,255,0.5)}
.fbtn.active{background:var(--accent);color:#000}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px}
.loading .msg{font-size:16px;font-weight:600}
.loading .sub{font-size:13px;color:var(--muted)}
.pbar{width:260px;height:5px;border-radius:3px;background:rgba(255,255,255,0.06);margin-top:8px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),#cc7a00);transition:width .3s}

.err{text-align:center;padding:60px 20px}
.err .msg{font-size:20px;font-weight:700;margin-bottom:8px}
.err .detail{font-size:13px;color:var(--muted);margin-bottom:20px}
.err button{padding:10px 24px;border-radius:8px;border:1px solid rgba(255,153,0,0.3);background:transparent;color:var(--accent);cursor:pointer;font-size:14px;font-family:inherit;font-weight:600}

.footer{text-align:center;padding:20px;font-size:10px;color:rgba(255,255,255,0.06);letter-spacing:1.5px}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:15px}

/* ── MODAL ── */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:#111;border:1px solid var(--border);border-radius:16px;padding:28px 32px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.modal-name{font-size:22px;font-weight:800;margin-bottom:2px}
.modal-spec{font-size:14px;color:var(--muted);margin-bottom:16px}
.modal-section{font-size:11px;font-weight:700;color:var(--faint);letter-spacing:1px;margin:18px 0 8px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.modal-row:last-child{border:none}
.modal-row .lbl{color:var(--muted)}
.modal-row .val{font-weight:600}
.modal-gear{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.modal-slot{display:flex;justify-content:space-between;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.02);font-size:12px}
.modal-slot .sl{color:var(--muted)}
.modal-slot .sv{font-weight:600}
.modal-slot.ok .sv{color:#4ade80}
.modal-slot.miss .sv{color:#f87171}
.modal-drow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.025)}
.modal-drow:last-child{border:none}

/* ── SPOTLIGHT ── */
.spotlight{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.spot-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center}
.spot-card .emoji{font-size:24px;margin-bottom:6px}
.spot-card .title{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-bottom:6px}
.spot-card .name{font-size:16px;font-weight:700;margin-bottom:2px}
.spot-card .detail{font-size:12px;color:var(--muted)}

/* ── CLICKABLE NAMES ── */
.clickable{cursor:pointer;transition:opacity .15s}
.clickable:hover{opacity:0.8;text-decoration:underline;text-decoration-color:rgba(255,255,255,0.2);text-underline-offset:2px}

/* ── INSIGHTS ── */
.insights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.insight-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;border-left:3px solid var(--accent)}
.insight-title{font-size:14px;font-weight:800;margin-bottom:6px;color:var(--accent);display:flex;align-items:center;gap:8px}
.insight-emoji{font-size:20px}
.insight-body{font-size:13px;line-height:1.5;margin-bottom:10px}
.insight-stat{font-size:28px;font-weight:900;color:var(--text);margin:8px 0 4px}
.insight-label{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:600}
.insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px}
.insight-item{background:rgba(255,255,255,0.02);padding:10px;border-radius:6px;border:1px solid rgba(255,255,255,0.04)}
.insight-item-name{font-size:12px;font-weight:700;margin-bottom:3px}
.insight-item-stat{font-size:11px;color:var(--muted)}
.insight-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-top:8px}
.insight-bar-fill{height:100%;border-radius:3px}

/* ── MOBILE ── */
@media(max-width:600px){
  .header{padding:16px 14px 14px}
  .h-row{flex-wrap:wrap;gap:10px}
  .brand-r{font-size:18px;padding:3px 8px 3px 10px}
  .brand-h{font-size:18px;padding:3px 10px 3px 8px}
  .g-info{margin-left:4px}
  .g-name{font-size:15px}
  .g-sub{font-size:11px}
  .refresh{padding:5px 10px;font-size:11px}
  .h-stats{gap:14px}
  .h-stat .v{font-size:18px}
  .h-stat .l{font-size:8px}
  .tabs{padding:12px 14px 0;gap:4px;overflow-x:auto;flex-wrap:nowrap}
  .tab{padding:6px 12px;font-size:12px;white-space:nowrap;flex-shrink:0}
  .content{padding:16px 14px 40px}
  .summary{grid-template-columns:repeat(2,1fr);gap:8px}
  .s-box{padding:14px 10px}
  .s-box .n{font-size:28px}
  .s-box .l{font-size:9px}
  .card{padding:12px 14px;margin-bottom:8px}
  .sec{font-size:10px;margin:16px 0 8px 2px}
  .tg{font-size:9px;padding:2px 6px}
  .spotlight{grid-template-columns:repeat(2,1fr);gap:8px}
  .spot-card{padding:10px 12px}
  .spot-card .emoji{font-size:20px}
  .spot-card .name{font-size:14px}
  .spot-card .detail{font-size:11px}
  .modal{padding:20px 16px;width:95%;border-radius:12px}
  .modal-name{font-size:18px}
  .modal-gear{grid-template-columns:1fr}
  .grid-wrap{font-size:11px}
  .grid-wrap th{font-size:9px;padding:6px 3px}
  .grid-wrap td{padding:5px 3px}
  .grid-wrap td:first-child{font-size:12px}
  .grid-cell{width:28px;height:22px;font-size:11px}
  .ksq{width:22px;min-width:22px;height:18px;font-size:9px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API="https://raider.io/api/v1";
const G_R="us",G_S="stormrage",G_N="Rolling For Blame";
const RAID_TIER="tier-mn-1";
const WCL_API="https://www.warcraftlogs.com/api/v2/client";
const WCL_CLIENT="a16d198f-79da-41e2-b24d-95a977c87f08";
const WCL_SECRET="wg4C3r5TaccouYvrRYOybVGYwqnXvI1tPjYm6IFX";
const ADMIN_KEY="77617263726166746c6f6773"; // hex encoded
let RAID_DATA=null;
const CC={Paladin:"#F58CBA",Warrior:"#C79C6E",Mage:"#69CCF0",Priest:"#FFFFFF",Warlock:"#9482C9",Hunter:"#ABD473",Rogue:"#FFF569",Shaman:"#0070DE",Druid:"#FF7D0A","Death Knight":"#C41E3A",DeathKnight:"#C41E3A",Monk:"#00FF96","Demon Hunter":"#A330C9",DemonHunter:"#A330C9",Evoker:"#33937F"};
const ENCHANT_SLOTS=[{key:"head",label:"Head"},{key:"shoulder",label:"Shoulders"},{key:"chest",label:"Chest"},{key:"legs",label:"Legs"},{key:"feet",label:"Boots"},{key:"finger1",label:"Ring 1"},{key:"finger2",label:"Ring 2"},{key:"mainhand",label:"Weapon"}];
const TIER_SLOTS=["head","shoulder","chest","hands","legs"];

function rioColor(s){if(s>=3000)return"#ff8000";if(s>=2500)return"#a335ee";if(s>=2000)return"#0070dd";if(s>=1500)return"#1eff00";if(s>=1000)return"#fff";return"rgba(255,255,255,0.3)";}
function ilvlColor(i){if(i>=265)return"#ff8000";if(i>=258)return"#a335ee";if(i>=250)return"#0070dd";if(i>=240)return"#1eff00";if(i>=230)return"#fff";return"#9d9d9d";}
function keyColor(lvl,timed){if(!timed)return{bg:"rgba(248,113,113,0.2)",fg:"#fca5a5"};if(lvl>=12)return{bg:"rgba(255,128,0,0.25)",fg:"#ffb366"};if(lvl>=10)return{bg:"rgba(163,53,238,0.25)",fg:"#c084fc"};if(lvl>=7)return{bg:"rgba(0,112,221,0.25)",fg:"#60a5fa"};return{bg:"rgba(30,255,0,0.15)",fg:"#86efac"};}
function raidScore(r){if(!r)return 0;return(r.mythic_bosses_killed||0)*300+(r.heroic_bosses_killed||0)*30+(r.normal_bosses_killed||0)*3;}

function auditGear(c){
  const issues=[];const gear=c.gear?.items;
  if(!gear)return[{text:"No gear data",type:"warn"}];
  for(const slot of ENCHANT_SLOTS){const item=gear[slot.key];if(!item||!item.item_id)continue;if(!item.enchants||item.enchants.length===0)issues.push({text:slot.label,type:"bad"});}
  for(const sk of["neck","finger1","finger2"]){const item=gear[sk];if(!item||!item.item_id)continue;if(item.gems&&item.gems.length>0)continue;if(item.bonuses&&(item.bonuses.includes(13668)||item.bonuses.includes(6652)))issues.push({text:(sk==="neck"?"Neck":sk==="finger1"?"Ring 1":"Ring 2")+" gem",type:"bad"});}
  return issues;
}

function countTier(c){
  const gear=c.gear?.items;if(!gear)return 0;
  let count=0;
  for(const slot of TIER_SLOTS){
    const item=gear[slot];
    if(!item||!item.item_id)continue;
    // Tier pieces have tier-specific bonus IDs and come from raid drops
    // Check for the tier bonus flag in the item data
    if(item.tier){count++;continue;}
    // Fallback: check if item has set bonus indicators
    if(item.bonuses){
      // Tier set bonus IDs are typically in specific ranges per season
      // Only count if we see actual tier-identifying bonuses (10299-10302 range for Midnight S1)
      const tierBonuses=[10299,10300,10301,10302,10303,10304,10305,10306,10307,10308];
      if(item.bonuses.some(b=>tierBonuses.includes(b)))count++;
    }
  }
  return Math.min(count,5);
}

function getDungeonRuns(c){return c.mythic_plus_best_runs||[];}
function getAllDungeons(chars){
  const set=new Map();
  for(const c of chars)for(const run of getDungeonRuns(c))if(!set.has(run.short_name))set.set(run.short_name,run.dungeon);
  return Array.from(set.entries()).sort((a,b)=>a[1].localeCompare(b[1]));
}
function getBestKey(c,shortName){const match=getDungeonRuns(c).find(r=>r.short_name===shortName);if(!match)return null;return{level:match.mythic_level,timed:match.num_keystone_upgrades>0,score:match.score};}

let S={status:"idle",progress:[0,0],guild:null,chars:[],tab:0,error:null,insights:null};
function set(p){Object.assign(S,p);render();}

async function loadRaidData(){
  try{
    const r=await fetch('raid-data.json');
    if(r.ok){RAID_DATA=await r.json();}
  }catch(e){console.log('No raid data yet');}
}

async function getWCLToken(){
  const r=await fetch('https://www.warcraftlogs.com/oauth/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=client_credentials&client_id=${WCL_CLIENT}&client_secret=${WCL_SECRET}`
  });
  if(!r.ok)throw new Error('WCL auth failed');
  const d=await r.json();
  return d.access_token;
}

async function fetchWCLReport(reportCode){
  const token=await getWCLToken();
  
  // Get fights and player list
  const query=`{
    reportData {
      report(code: "${reportCode}") {
        fights(killType: Kills) {
          id
          name
          difficulty
          encounterID
          startTime
          endTime
          kill
        }
        masterData {
          actors(type: "Player") {
            id
            name
            type
            subType
          }
        }
      }
    }
  }`;
  
  const r=await fetch(WCL_API,{
    method:'POST',
    headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({query})
  });
  
  if(!r.ok)throw new Error('WCL fetch failed: '+r.status);
  const d=await r.json();
  if(d.errors){
    console.error('GraphQL errors:',d.errors);
    throw new Error('GraphQL error: '+d.errors[0].message);
  }
  
  return d.data.reportData.report;
}

async function fetchWCLParses(reportCode,report){
  const token=await getWCLToken();
  const parses=[];
  const fights=report.fights.filter(f=>f.kill);
  
  for(const fight of fights){
    // Get table data, rankings, AND performance data (deaths/interrupts/dispels)
    const query=`{
      reportData {
        report(code: "${reportCode}") {
          table(
            fightIDs: [${fight.id}]
            startTime: ${fight.startTime}
            endTime: ${fight.endTime}
          )
          rankings(fightIDs: [${fight.id}])
          
          deaths: events(
            fightIDs: [${fight.id}]
            dataType: Deaths
            limit: 100
          ) {
            data
          }
          
          interrupts: events(
            fightIDs: [${fight.id}]
            dataType: Interrupts
            limit: 200
          ) {
            data
          }
          
          dispels: events(
            fightIDs: [${fight.id}]
            dataType: Dispels
            limit: 200
          ) {
            data
          }
        }
      }
    }`;
    
    const r=await fetch(WCL_API,{
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({query})
    });
    
    if(r.ok){
      const d=await r.json();
      
      if(d.errors){
        console.error('Fight',fight.id,'errors:',d.errors);
      }
      
      let tableData=d.data?.reportData?.report?.table;
      let rankingsData=d.data?.reportData?.report?.rankings;
      const deaths=d.data?.reportData?.report?.deaths?.data||[];
      const interrupts=d.data?.reportData?.report?.interrupts?.data||[];
      const dispels=d.data?.reportData?.report?.dispels?.data||[];
      
      // Parse JSON strings
      if(tableData && typeof tableData==='string'){
        tableData=JSON.parse(tableData);
      }
      if(rankingsData && typeof rankingsData==='string'){
        rankingsData=JSON.parse(rankingsData);
      }
      
      console.log('Fight',fight.id,fight.name,'- table:',tableData);
      console.log('Fight',fight.id,fight.name,'- rankings:',rankingsData);
      console.log('Fight',fight.id,fight.name,'- deaths:',deaths.length,'interrupts:',interrupts.length,'dispels:',dispels.length);
      
      parses.push({
        fight:fight,
        tableData:tableData,
        rankingsData:rankingsData,
        deaths:deaths,
        interrupts:interrupts,
        dispels:dispels
      });
    }
    
    await sleep(300);
  }
  
  return parses;
}

function processRaidData(report,parses){
  const players=new Map();
  const fightGuildMetrics=new Map(); // Track guild metrics per fight
  const fightPerformance=[]; // Track death/interrupt/dispel data per fight
  
  for(const p of parses){
    const fight=p.fight;
    const tableData=p.tableData;
    const rankingsData=p.rankingsData;
    const deaths=p.deaths||[];
    const interrupts=p.interrupts||[];
    const dispels=p.dispels||[];
    
    console.log('Processing fight:',fight.name);
    
    // Build ID to name map from master data
    const idToName=new Map();
    for(const actor of report.masterData.actors){
      if(actor.type==="Player"){
        idToName.set(actor.id,actor.name);
      }
    }
    
    // Process performance data for this fight
    const fightPerf={
      encounterID:fight.encounterID,
      difficulty:fight.difficulty,
      name:fight.name,
      deaths:{},
      interrupts:{},
      dispels:{}
    };
    
    // Count deaths per player
    for(const event of deaths){
      const name=idToName.get(event.targetID);
      if(name){
        fightPerf.deaths[name]=(fightPerf.deaths[name]||0)+1;
      }
    }
    
    // Count interrupts per player
    for(const event of interrupts){
      const name=idToName.get(event.sourceID);
      if(name){
        fightPerf.interrupts[name]=(fightPerf.interrupts[name]||0)+1;
      }
    }
    
    // Count dispels per player
    for(const event of dispels){
      const name=idToName.get(event.sourceID);
      if(name){
        fightPerf.dispels[name]=(fightPerf.dispels[name]||0)+1;
      }
    }
    
    fightPerformance.push(fightPerf);
    
    if(!tableData||!tableData.data){
      console.log('  No table data, skipping');
      continue;
    }
    
    // Build a map of player NAME to parse % from rankings
    const parseMap=new Map();
    let guildSpeed=null;
    let guildExecution=null;
    
    if(rankingsData&&rankingsData.data&&rankingsData.data[0]){
      const rankData=rankingsData.data[0];
      
      // Extract guild-level speed and execution rankings
      if(rankData.speed){
        guildSpeed=rankData.speed.rank||null;
      }
      if(rankData.execution){
        guildExecution=rankData.execution.rank||null;
      }
      
      // Store guild metrics for this fight
      const fightKey=`${fight.encounterID}-${fight.difficulty}`;
      fightGuildMetrics.set(fightKey,{speed:guildSpeed,execution:guildExecution});
      
      if(rankData.roles){
        const roles=rankData.roles;
        
        // Process DPS
        if(roles.dps&&roles.dps.characters){
          for(const char of roles.dps.characters){
            parseMap.set(char.name,{
              parse:char.rankPercent||0,
              rank:char.rank||null,
              spec:char.spec||'Unknown',
              role:'DPS',
              amount:char.amount||0
            });
          }
        }
        
        // Process Healers
        if(roles.healers&&roles.healers.characters){
          for(const char of roles.healers.characters){
            parseMap.set(char.name,{
              parse:char.rankPercent||0,
              rank:char.rank||null,
              spec:char.spec||'Unknown',
              role:'HEALING',
              amount:char.amount||0
            });
          }
        }
        
        // Process Tanks
        if(roles.tanks&&roles.tanks.characters){
          for(const char of roles.tanks.characters){
            parseMap.set(char.name,{
              parse:char.rankPercent||0,
              rank:char.rank||null,
              spec:char.spec||'Unknown',
              role:'TANK',
              amount:char.amount||0
            });
          }
        }
      }
      
      console.log('  Built parseMap with',parseMap.size,'entries');
      if(guildSpeed)console.log('  Guild speed rank:',guildSpeed);
      if(guildExecution)console.log('  Guild execution rank:',guildExecution);
    }else{
      console.log('  No rankings data');
    }
    
    // Process players from table data
    const composition=tableData.data.composition||[];
    const damageDone=tableData.data.damageDone||[];
    const healingDone=tableData.data.healingDone||[];
    
    console.log('  Composition has',composition.length,'players');
    
    for(let i=0;i<composition.length;i++){
      const comp=composition[i];
      const actor=report.masterData.actors.find(a=>a.id===comp.id);
      
      if(!actor){
        console.log('  Player',comp.id,'not found in masterData');
        continue;
      }
      if(actor.type!=="Player"){
        console.log('  Actor',comp.id,actor.name,'is not a Player, type:',actor.type);
        continue;
      }
      
      // Match by NAME instead of ID
      const parseData=parseMap.get(actor.name);
      if(!parseData){
        console.log('  No parse data for',actor.name);
        continue;
      }
      
      if(!players.has(actor.name)){
        players.set(actor.name,{
          name:actor.name,
          class:actor.subType,
          role:parseData.role,
          bosses:[]
        });
      }
      
      const player=players.get(actor.name);
      
      player.bosses.push({
        boss:fight.name,
        encounterID:fight.encounterID||0,
        difficulty:fight.difficulty||0,
        parse:Math.round(parseData.parse),
        rank:parseData.rank||null,
        amount:parseData.amount||0,
        spec:parseData.spec
      });
      
      console.log('  Added',actor.name,'with parse:',parseData.parse,'rank:',parseData.rank,'amount:',parseData.amount);
    }
  }
  
  console.log('Total unique players:',players.size);
  
  const result=[];
  for(const[name,data]of players){
    if(data.bosses.length===0)continue;
    const avg=data.bosses.reduce((s,b)=>s+b.parse,0)/data.bosses.length;
    const best=data.bosses.reduce((max,b)=>b.parse>max.parse?b:max,{parse:0,boss:''});
    result.push({...data,avgParse:Math.round(avg),bestParse:best});
  }
  
  // Build fights array with guild metrics
  const fightMetrics=[];
  const seenFights=new Set();
  
  for(const p of parses){
    const fightKey=`${p.fight.encounterID}-${p.fight.difficulty}`;
    if(seenFights.has(fightKey))continue;
    seenFights.add(fightKey);
    
    const fightData={
      name:p.fight.name,
      encounterID:p.fight.encounterID||0,
      difficulty:p.fight.difficulty||0
    };
    
    const metrics=fightGuildMetrics.get(fightKey);
    if(metrics){
      if(metrics.speed)fightData.guildSpeed=metrics.speed;
      if(metrics.execution)fightData.guildExecution=metrics.execution;
    }
    
    fightMetrics.push(fightData);
  }
  
  return{
    updated:new Date().toISOString(),
    players:result,
    fights:fightMetrics,
    performance:fightPerformance
  };
}

async function fetchGuild(){const r=await fetch(`${API}/guilds/profile?region=${G_R}&realm=${encodeURIComponent(G_S)}&name=${encodeURIComponent(G_N)}&fields=raid_progression,members`);if(!r.ok)throw new Error("Guild fetch failed: "+r.status);return r.json();}
async function fetchChar(realm,name){
  try{const r=await fetch(`${API}/characters/profile?region=${G_R}&realm=${encodeURIComponent(realm)}&name=${encodeURIComponent(name)}&fields=mythic_plus_scores_by_season:current,mythic_plus_best_runs:all,mythic_plus_alternate_runs:all,raid_progression,gear`);
  if(!r.ok)return null;return r.json();}catch(e){return null;}
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function buildInsights(chars){
  const insights=[];
  const dungeons=["Magister's Terrace","Maisara Caverns","Nexus Point Xenas","Windrunner Spire","Algeth'ar Academy","Seat of the Triumvirate","Ruby Life Pools","Brackenhide Hollow"];
  
  // Helper to get ALL runs for a character
  const getAllRuns=(char)=>[...(char?.mythic_plus_best_runs||[]),...(char?.mythic_plus_alternate_runs||[])];
  
  // Collect ALL runs with full data
  const allRuns=[];
  const playerStats=new Map();
  
  for(const c of chars){
    const runs=getAllRuns(c);
    if(c.name==="Hashmaker"){
      console.log('Hashmaker run count:',runs.length);
      console.log('Hashmaker best_runs:',c.mythic_plus_best_runs?.length||0);
      console.log('Hashmaker alternate_runs:',c.mythic_plus_alternate_runs?.length||0);
    }
    
    for(const run of runs){
      allRuns.push({...run,player:c.name,class:c.class});
      
      if(!playerStats.has(c.name)){
        playerStats.set(c.name,{
          name:c.name,
          class:c.class,
          score:c.mythic_plus_scores_by_season?.[0]?.scores?.all||0,
          ilvl:c.gear?.item_level_equipped||0,
          totalRuns:0,
          timedRuns:0,
          dungeonStats:new Map()
        });
      }
      
      const ps=playerStats.get(c.name);
      ps.totalRuns++;
      if(run.num_keystone_upgrades>0)ps.timedRuns++;
      
      if(!ps.dungeonStats.has(run.dungeon)){
        ps.dungeonStats.set(run.dungeon,{total:0,timed:0});
      }
      const ds=ps.dungeonStats.get(run.dungeon);
      ds.total++;
      if(run.num_keystone_upgrades>0)ds.timed++;
    }
  }
  
  if(allRuns.length===0)return insights;
  
  const guildAvgSuccess=allRuns.filter(r=>r.num_keystone_upgrades>0).length/allRuns.length;
  
  // 1. INACTIVE CALLOUT
  const now=Date.now();
  const twoWeeks=14*24*60*60*1000;
  const inactive=Array.from(playerStats.values())
    .filter(p=>p.totalRuns>2)
    .map(p=>{
      const lastRun=chars.find(c=>c.name===p.name)?.mythic_plus_best_runs?.reduce((latest,r)=>
        new Date(r.completed_at).getTime()>new Date(latest.completed_at).getTime()?r:latest
      );
      return{name:p.name,days:lastRun?Math.floor((now-new Date(lastRun.completed_at).getTime())/(24*60*60*1000)):999};
    })
    .filter(p=>p.days>7)
    .sort((a,b)=>b.days-a.days)
    .slice(0,5);
  
  const inactiveNames=new Set(inactive.map(p=>p.name));
  
  if(inactive.length>0){
    insights.push({
      type:"warning",
      emoji:"⏰",
      title:"MIA Alert",
      body:`${inactive.map(p=>p.name).slice(0,3).join(", ")} ${inactive.length>3?`+${inactive.length-3} others`:''} haven't run keys lately.`,
      color:"#f87171"
    });
  }
  
  // 2. GEAR VS PERFORMANCE GAP
  const gearGap=Array.from(playerStats.values())
    .filter(p=>!inactiveNames.has(p.name)&&p.totalRuns>=3&&p.ilvl>=610)
    .map(p=>{
      const highestKey=chars.find(c=>c.name===p.name)?.mythic_plus_best_runs?.reduce((max,r)=>r.mythic_level>max?r.mythic_level:max,0)||0;
      return{name:p.name,ilvl:p.ilvl,highestKey,gap:p.ilvl-600-highestKey*10};
    })
    .filter(p=>p.gap>30)
    .sort((a,b)=>b.gap-a.gap)
    .slice(0,3);
  
  if(gearGap.length>0){
    insights.push({
      type:"potential",
      emoji:"💎",
      title:"Gear Untapped",
      body:`${gearGap[0].name} has ${gearGap[0].ilvl} ilvl but highest key is only +${gearGap[0].highestKey}. Push higher.`,
      stat:`+${gearGap[0].highestKey}`,
      label:"HIGHEST KEY WITH "+gearGap[0].ilvl+" ILVL",
      color:"#a78bfa"
    });
  }
  
  // 3. COMP-SPECIFIC STRUGGLES
  const compPerf=new Map();
  for(const run of allRuns){
    const roster=run.roster||[];
    const melee=roster.filter(p=>["Warrior","Rogue","Monk","DeathKnight","DemonHunter","Paladin","Druid"].includes(p.character.class)).length;
    const compKey=melee>=3?"Triple Melee":(melee<=1?"Ranged Heavy":"Balanced");
    
    if(!compPerf.has(compKey+"|"+run.dungeon)){
      compPerf.set(compKey+"|"+run.dungeon,{comp:compKey,dungeon:run.dungeon,total:0,timed:0});
    }
    const cp=compPerf.get(compKey+"|"+run.dungeon);
    cp.total++;
    if(run.num_keystone_upgrades>0)cp.timed++;
  }
  
  const compStruggles=Array.from(compPerf.values())
    .filter(c=>c.total>=3)
    .map(c=>({...c,rate:c.timed/c.total}))
    .filter(c=>c.rate<0.5)
    .sort((a,b)=>a.rate-b.rate)
    .slice(0,1);
  
  if(compStruggles.length>0){
    const cs=compStruggles[0];
    insights.push({
      type:"struggle",
      emoji:"⚔️",
      title:"Comp Kryptonite",
      body:`${cs.comp} in ${cs.dungeon}: ${(cs.rate*100).toFixed(0)}% success rate. This combo struggles.`,
      stat:(cs.rate*100).toFixed(0)+"%",
      label:"SUCCESS RATE",
      color:"#f87171"
    });
  }
  
  // 4. PLAYER CARRY EFFECT
  const playerImpact=Array.from(playerStats.values())
    .filter(p=>!inactiveNames.has(p.name)&&p.totalRuns>=5)
    .map(p=>({name:p.name,rate:p.timedRuns/p.totalRuns,total:p.totalRuns}))
    .sort((a,b)=>b.rate-a.rate);
  
  if(playerImpact.length>0&&playerImpact[0].rate>guildAvgSuccess+0.1){
    const carry=playerImpact[0];
    const diff=((carry.rate-guildAvgSuccess)*100).toFixed(0);
    insights.push({
      type:"mvp",
      emoji:"👑",
      title:"The Carry",
      body:`${carry.name} times ${(carry.rate*100).toFixed(0)}% of keys. Guild avg: ${(guildAvgSuccess*100).toFixed(0)}%. Invite them.`,
      stat:"+"+diff+"%",
      label:"ABOVE GUILD AVG",
      color:"#fbbf24"
    });
  }
  
  // 5. DUNGEON SPECIALIST (actually hidden)
  const specialists=[];
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name))continue;
    for(const [dungeon,ds] of ps.dungeonStats){
      if(ds.total>=3){
        const rate=ds.timed/ds.total;
        const avgForDungeon=allRuns.filter(r=>r.dungeon===dungeon&&r.num_keystone_upgrades>0).length/allRuns.filter(r=>r.dungeon===dungeon).length;
        if(rate>avgForDungeon+0.2){
          specialists.push({name,dungeon,rate,diff:rate-avgForDungeon});
        }
      }
    }
  }
  
  specialists.sort((a,b)=>b.diff-a.diff);
  if(specialists.length>0){
    const s=specialists[0];
    insights.push({
      type:"specialist",
      emoji:"🎯",
      title:"Secret Specialist",
      body:`${s.name} dominates ${s.dungeon}. ${(s.rate*100).toFixed(0)}% timing rate.`,
      stat:(s.rate*100).toFixed(0)+"%",
      label:"IN "+s.dungeon.split(' ')[0].toUpperCase(),
      color:"#4ade80"
    });
  }
  
  // 6. TANK/HEALER CHEMISTRY
  const thPairs=new Map();
  for(const run of allRuns){
    const roster=run.roster||[];
    const tank=roster.find(p=>p.character.spec?.role==="TANK");
    const healer=roster.find(p=>p.character.spec?.role==="HEALING");
    if(!tank||!healer)continue;
    if(inactiveNames.has(tank.character.name)||inactiveNames.has(healer.character.name))continue;
    const key=[tank.character.name,healer.character.name].sort().join("|");
    if(!thPairs.has(key)){
      thPairs.set(key,{tank:tank.character.name,healer:healer.character.name,total:0,timed:0});
    }
    const pair=thPairs.get(key);
    pair.total++;
    if(run.num_keystone_upgrades>0)pair.timed++;
  }
  
  const bestPair=Array.from(thPairs.values())
    .filter(p=>p.total>=4)
    .map(p=>({...p,rate:p.timed/p.total}))
    .sort((a,b)=>b.rate-a.rate)[0];
  
  if(bestPair&&bestPair.rate>0.65){
    insights.push({
      type:"chemistry",
      emoji:"🤝",
      title:"Perfect Pairing",
      body:`${bestPair.tank} + ${bestPair.healer}: ${(bestPair.rate*100).toFixed(0)}% success. This duo works.`,
      stat:(bestPair.rate*100).toFixed(0)+"%",
      label:"ACROSS "+bestPair.total+" KEYS",
      color:"#60a5fa"
    });
  }
  
  // 7. VOLUME KINGS
  const topVolume=Array.from(playerStats.values())
    .filter(p=>!inactiveNames.has(p.name)&&p.totalRuns>0)
    .sort((a,b)=>b.totalRuns-a.totalRuns)
    .slice(0,5);
  
  if(topVolume.length>0&&topVolume[0].totalRuns>8){
    insights.push({
      type:"grind",
      emoji:"⚡",
      title:"Volume Leaders",
      body:"Putting in the reps.",
      items:topVolume.map(p=>({name:p.name,stat:p.totalRuns+" keys"})),
      color:"#a855f7"
    });
  }
  
  // 8. CONSISTENCY CHECK
  // 8. DEPLETION STREAK (depleted X keys in a row)
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name)||ps.totalRuns<10)continue;
    const char=chars.find(c=>c.name===name);
    const runs=(getAllRuns(char)||[]).sort((a,b)=>new Date(a.completed_at).getTime()-new Date(b.completed_at).getTime());
    let maxStreak=0;
    let currentStreak=0;
    for(const run of runs){
      if(run.num_keystone_upgrades===0){
        currentStreak++;
        maxStreak=Math.max(maxStreak,currentStreak);
      }else{
        currentStreak=0;
      }
    }
    if(maxStreak>=5){
      insights.push({
        emoji:"📉",
        title:"Depletion Spiral",
        body:`${name} hit a ${maxStreak}-key depletion streak at some point. That's a rough week.`,
        stat:String(maxStreak),
        label:"CONSECUTIVE DEPLETES",
        color:"#ef4444"
      });
      break;
    }
  }
  
  // 9. DUNGEON AVOIDANCE
  const avoidance=new Map();
  for(const dungeon of dungeons){
    const runCount=allRuns.filter(r=>r.dungeon===dungeon).length;
    avoidance.set(dungeon,runCount);
  }
  const avgDungeonRuns=Array.from(avoidance.values()).reduce((s,c)=>s+c,0)/dungeons.length;
  const avoided=Array.from(avoidance.entries())
    .map(([d,c])=>({dungeon:d,count:c,diff:avgDungeonRuns-c}))
    .filter(d=>d.diff>avgDungeonRuns*0.3)
    .sort((a,b)=>b.diff-a.diff)[0];
  
  if(avoided){
    insights.push({
      type:"avoidance",
      emoji:"🚫",
      title:"The Avoided Dungeon",
      body:`${avoided.dungeon} is getting dodged. ${avoided.count} runs vs ${Math.floor(avgDungeonRuns)} avg.`,
      stat:avoided.count+"",
      label:"TOTAL GUILD RUNS",
      color:"#fb923c"
    });
  }
  
  // 10. TONS OF QUIRKY FUN INSIGHTS
  
  // Most diverse group builder
  const groupDiversity=new Map();
  for(const run of allRuns){
    const roster=(run.roster||[]).map(p=>p.character.name).sort().join("|");
    if(!groupDiversity.has(run.player)){
      groupDiversity.set(run.player,new Set());
    }
    groupDiversity.get(run.player).add(roster);
  }
  const mostDiverse=Array.from(groupDiversity.entries())
    .filter(([name])=>!inactiveNames.has(name))
    .map(([name,groups])=>({name,uniqueGroups:groups.size}))
    .sort((a,b)=>b.uniqueGroups-a.uniqueGroups)[0];
  if(mostDiverse&&mostDiverse.uniqueGroups>=5){
    insights.push({
      emoji:"🎲",
      title:"Group Roulette",
      body:`${mostDiverse.name} has run with ${mostDiverse.uniqueGroups} completely different 5-man combinations. Variety king.`,
      color:"#8b5cf6"
    });
  }
  
  // Dungeon loyalist (runs one dungeon way more than others)
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name)||ps.totalRuns<10)continue;
    const sorted=Array.from(ps.dungeonStats.entries()).sort((a,b)=>b[1].total-a[1].total);
    if(sorted.length>0&&sorted[0][1].total>=ps.totalRuns*0.35){
      insights.push({
        emoji:"🔁",
        title:"Dungeon Loyalist",
        body:`${name} has run ${sorted[0][0]} ${sorted[0][1].total} times. That's ${((sorted[0][1].total/ps.totalRuns)*100).toFixed(0)}% of all keys.`,
        color:"#06b6d4"
      });
      break;
    }
  }
  
  // Never grouped together
  const allActiveNames=Array.from(playerStats.keys()).filter(n=>!inactiveNames.has(n)&&playerStats.get(n).totalRuns>=5);
  const pairsSeen=new Set();
  for(const run of allRuns){
    const roster=(run.roster||[]).map(p=>p.character.name).filter(n=>allActiveNames.includes(n)).sort();
    for(let i=0;i<roster.length;i++){
      for(let j=i+1;j<roster.length;j++){
        pairsSeen.add([roster[i],roster[j]].join("|"));
      }
    }
  }
  const neverPaired=[];
  for(let i=0;i<allActiveNames.length;i++){
    for(let j=i+1;j<allActiveNames.length;j++){
      const key=[allActiveNames[i],allActiveNames[j]].sort().join("|");
      if(!pairsSeen.has(key)){
        neverPaired.push({p1:allActiveNames[i],p2:allActiveNames[j]});
        if(neverPaired.length>=2)break;
      }
    }
    if(neverPaired.length>=2)break;
  }
  if(neverPaired.length>0){
    const pair=neverPaired[0];
    insights.push({
      emoji:"👻",
      title:"Ships in the Night",
      body:`${pair.p1} and ${pair.p2} have never run together despite both being active. Introduce yourselves.`,
      color:"#6366f1"
    });
  }
  
  // WEEKEND WARRIOR (most keys run on weekends vs weekdays)
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name)||ps.totalRuns<10)continue;
    const char=chars.find(c=>c.name===name);
    const runs=getAllRuns(char)||[];
    let weekendRuns=0;
    for(const run of runs){
      const date=new Date(run.completed_at);
      const day=date.getDay();
      if(day===0||day===6)weekendRuns++;
    }
    const weekendRatio=weekendRuns/runs.length;
    if(weekendRatio>=0.75&&runs.length>=12){
      insights.push({
        emoji:"🌅",
        title:"Weekend Warrior",
        body:`${name} runs ${(weekendRatio*100).toFixed(0)}% of keys on weekends. 9-to-5 grind hitting different.`,
        stat:(weekendRatio*100).toFixed(0)+"%",
        label:"WEEKEND KEYS",
        color:"#f59e0b"
      });
      break;
    }
  }
  
  // Spread the success (times with many, depletes with few)
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name)||ps.totalRuns<10)continue;
    const char=chars.find(c=>c.name===name);
    const runs=getAllRuns(char)||[];
    const timedPartners=new Set();
    const depletedPartners=new Set();
    for(const run of runs){
      const roster=(run.roster||[]).map(p=>p.character.name).filter(n=>n!==name);
      if(run.num_keystone_upgrades>0){
        roster.forEach(p=>timedPartners.add(p));
      }else{
        roster.forEach(p=>depletedPartners.add(p));
      }
    }

    const rates=Array.from(ps.dungeonStats.entries())
      .filter(([d,ds])=>ds.total>=5)
      .map(([d,ds])=>({dungeon:d,rate:ds.timed/ds.total,total:ds.total}))
      .sort((a,b)=>a.rate-b.rate);
    
    if(rates.length>=3){
      const worst=rates[0];
      const others=rates.slice(1);
      const avgOthers=others.reduce((s,r)=>s+r.rate,0)/others.length;
      if(avgOthers>0.65&&worst.rate<0.3&&avgOthers-worst.rate>0.4){
        insights.push({
          emoji:"😡",
          title:"Dungeon Nemesis",
          body:`${name}: ${(worst.rate*100).toFixed(0)}% in ${worst.dungeon} but ${(avgOthers*100).toFixed(0)}% everywhere else. This one hurts.`,
          color:"#dc2626"
        });
        break;
      }
    }
  }
  
  // Low death count player (if death data available - may not be)
  // Skipping for now
  
  // Deplete specialist (someone who's in a lot of bricked keys)
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name)||ps.totalRuns<15)continue;
    const depleteRate=1-(ps.timedRuns/ps.totalRuns);
    if(depleteRate>=0.6&&ps.totalRuns>=15){
      insights.push({
        emoji:"💀",
        title:"Brick Layer",
        body:`${name} depletes ${(depleteRate*100).toFixed(0)}% of keys. ${ps.totalRuns-ps.timedRuns} out of ${ps.totalRuns} bricked.`,
        stat:(depleteRate*100).toFixed(0)+"%",
        label:"DEPLETION RATE",
        color:"#7f1d1d"
      });
      break;
    }
  }
  
  // Guild carry (someone running with people way below their score)
  for(const [name,ps] of playerStats){
    if(inactiveNames.has(name)||ps.totalRuns<10||ps.score<2000)continue;
    const char=chars.find(c=>c.name===name);
    const runs=getAllRuns(char)||[];
    let lowScoreGroupCount=0;
    for(const run of runs){
      const roster=run.roster||[];
      const guildies=roster.filter(p=>playerStats.has(p.character.name));
      if(guildies.length>=3){
        const avgScore=guildies.reduce((s,p)=>s+(playerStats.get(p.character.name)?.score||0),0)/guildies.length;
        if(avgScore<ps.score-400)lowScoreGroupCount++;
      }
    }
    if(lowScoreGroupCount>=runs.length*0.4){
      insights.push({
        emoji:"🎒",
        title:"Guild Sherpa",
        body:`${name} (${ps.score} R.IO) groups with lower-scored guildies ${((lowScoreGroupCount/runs.length)*100).toFixed(0)}% of the time. Carrying the squad.`,
        color:"#0891b2"
      });
      break;
    }
  }

  
  console.log('Total runs across all players:',allRuns.length);
  console.log('Sample playerStats:',Array.from(playerStats.entries()).slice(0,3).map(([name,ps])=>({name,totalRuns:ps.totalRuns})));
  
  // Tag all M+ insights with category
  for(const insight of insights){
    if(!insight.category)insight.category='keys';
  }
  
  return insights;
}

function buildRaidInsights(){
  if(!RAID_DATA||!RAID_DATA.performance)return[];
  
  const insights=[];
  const perf=RAID_DATA.performance;
  const players=RAID_DATA.players;
  
  // Get active difficulty
  const activeDiff=getActiveDifficulty();
  const relevantFights=perf.filter(f=>f.difficulty===activeDiff);
  
  if(relevantFights.length===0)return insights;
  
  // Aggregate stats across all fights
  const playerStats=new Map();
  
  for(const fight of relevantFights){
    // Deaths
    for(const[name,count]of Object.entries(fight.deaths)){
      if(!playerStats.has(name)){
        const player=players.find(p=>p.name===name);
        playerStats.set(name,{
          name,
          class:player?.class||'Unknown',
          role:player?.role||'DPS',
          deaths:0,
          interrupts:0,
          dispels:0,
          fights:0
        });
      }
      playerStats.get(name).deaths+=count;
    }
    
    // Interrupts
    for(const[name,count]of Object.entries(fight.interrupts)){
      if(!playerStats.has(name)){
        const player=players.find(p=>p.name===name);
        playerStats.set(name,{
          name,
          class:player?.class||'Unknown',
          role:player?.role||'DPS',
          deaths:0,
          interrupts:0,
          dispels:0,
          fights:0
        });
      }
      playerStats.get(name).interrupts+=count;
    }
    
    // Dispels
    for(const[name,count]of Object.entries(fight.dispels)){
      if(!playerStats.has(name)){
        const player=players.find(p=>p.name===name);
        playerStats.set(name,{
          name,
          class:player?.class||'Unknown',
          role:player?.role||'DPS',
          deaths:0,
          interrupts:0,
          dispels:0,
          fights:0
        });
      }
      playerStats.get(name).dispels+=count;
    }
    
    // Count fights per player
    const allNames=new Set([
      ...Object.keys(fight.deaths),
      ...Object.keys(fight.interrupts),
      ...Object.keys(fight.dispels)
    ]);
    for(const name of allNames){
      if(playerStats.has(name)){
        playerStats.get(name).fights++;
      }
    }
  }
  
  // Calculate guild averages
  const allPlayers=Array.from(playerStats.values());
  if(allPlayers.length===0)return insights;
  
  const avgInterruptsPerFight=allPlayers.reduce((s,p)=>s+(p.interrupts/p.fights),0)/allPlayers.length;
  
  // POSITIVE INSIGHT 1: Interrupt MVP
  const interruptLeaders=allPlayers
    .filter(p=>p.fights>=2 && p.interrupts>0)
    .sort((a,b)=>(b.interrupts/b.fights)-(a.interrupts/a.fights))
    .slice(0,3);
  
  if(interruptLeaders.length>=1){
    const top=interruptLeaders[0];
    const intRate=(top.interrupts/top.fights).toFixed(1);
    insights.push({
      emoji:"⛔",
      title:"Interrupt Leaders",
      body:`${top.name} leads with ${intRate} interrupts per fight${interruptLeaders.length>=2?`, followed by ${interruptLeaders[1].name}`:''}.`,
      stat:String(top.interrupts),
      label:"TOTAL INTERRUPTS",
      color:"#10b981",
      category:"raid"
    });
  }
  
  // POSITIVE INSIGHT 2: Dispel MVP
  const dispelLeaders=allPlayers
    .filter(p=>p.fights>=2 && p.dispels>0)
    .sort((a,b)=>(b.dispels/b.fights)-(a.dispels/a.fights))
    .slice(0,3);
  
  if(dispelLeaders.length>=1){
    const top=dispelLeaders[0];
    const dispRate=(top.dispels/top.fights).toFixed(1);
    insights.push({
      emoji:"✨",
      title:"Dispel MVP",
      body:`${top.name} is handling dispels with ${dispRate} per fight. Debuff destroyer.`,
      stat:String(top.dispels),
      label:"TOTAL DISPELS",
      color:"#60a5fa",
      category:"raid"
    });
  }
  
  // POSITIVE INSIGHT 3: Deathless Raiders
  const deathlessPlayers=allPlayers
    .filter(p=>p.fights>=3 && p.deaths===0)
    .sort((a,b)=>b.fights-a.fights);
  
  if(deathlessPlayers.length>0){
    const names=deathlessPlayers.slice(0,3).map(p=>p.name).join(', ');
    insights.push({
      emoji:"🛡️",
      title:"Deathless",
      body:`${names} ${deathlessPlayers.length===1?'has':'have'} stayed alive across all ${deathlessPlayers[0].fights} fights tracked. Clean execution.`,
      stat:String(deathlessPlayers.length),
      label:"DEATHLESS RAIDERS",
      color:"#a78bfa",
      category:"raid"
    });
  }
  
  // CONSTRUCTIVE INSIGHT: Interrupt opportunity (only if gap is significant)
  const lowInterrupters=allPlayers
    .filter(p=>p.fights>=2 && p.role==='DPS' && p.interrupts/p.fights<avgInterruptsPerFight*0.5)
    .sort((a,b)=>(a.interrupts/a.fights)-(b.interrupts/b.fights));
  
  if(lowInterrupters.length>=3 && avgInterruptsPerFight>=1){
    insights.push({
      emoji:"💡",
      title:"Interrupt Opportunity",
      body:`Guild averages ${avgInterruptsPerFight.toFixed(1)} interrupts per fight. More kicks means smoother pulls.`,
      stat:avgInterruptsPerFight.toFixed(1),
      label:"GUILD AVERAGE",
      color:"#fbbf24",
      category:"raid"
    });
  }
  
  return insights;
}

async function loadAll(){
  try{
    set({status:"guild",error:null});
    await loadRaidData();
    const guild=await fetchGuild();set({guild});
    const cutoff=new Date();cutoff.setDate(cutoff.getDate()-60);
    const recent=guild.members.filter(m=>{const d=new Date(m.character.last_crawled_at);return d>cutoff&&m.character.active_spec_name;});
    set({status:"chars"});
    const chars=[];
    for(let i=0;i<recent.length;i+=8){
      const chunk=recent.slice(i,i+8);
      const res=await Promise.all(chunk.map(m=>fetchChar(m.character.realm,m.character.name)));
      res.forEach(r=>{if(r){const il=r.gear?.item_level_equipped||0;if(il===0||il<300)chars.push(r);}});
      set({progress:[Math.min(recent.length,i+8),recent.length],chars:[...chars]});
      if(i+8<recent.length)await sleep(200);
    }
    const keyInsights=buildInsights(chars);
    const raidInsights=buildRaidInsights();
    const insights=[...raidInsights,...keyInsights];
    console.log('Generated insights:',insights.length,insights);
    set({status:"done",chars,insights});
  }catch(e){set({status:"error",error:e.message});}
}

  function renderInput(){

        },"Reset All Data")
      ),
      h("div",{id:"fetch-status",style:{marginTop:"12px",fontSize:"13px",color:"var(--muted)"}})
    ));
  }
  
  async function fetchReport(){
    const url=(document.getElementById('wcl-url')?.value||'').trim();
    const match=url.match(/reports\/([a-zA-Z0-9]+)/);
    if(!match){alert('Invalid WCL URL');return;}
    
    const code=match[1];
    const status=document.getElementById('fetch-status');
    const appendMode=document.getElementById('append-mode')?.checked||false;
    
    status.textContent='Fetching report...';
    
    try{
      const report=await fetchWCLReport(code);
      console.log('GraphQL Report data:',report);
      
      const kills=report.fights.filter(f=>f.kill);
      status.textContent='Fetching parse data ('+kills.length+' kills)...';
      
      const parses=await fetchWCLParses(code,report);
      console.log('GraphQL Parse data:',parses);
      
      const newData=processRaidData(report,parses);
      console.log('Processed new data:',newData);
      
      if(appendMode&&reportData){
        // Merge with existing data
        reportData=mergeRaidData(reportData,newData);
        console.log('Merged with existing data:',reportData);
        status.textContent='Merged with existing data';
      }else{
        reportData=newData;
        status.textContent='';
      }
      
      renderPreview();
    }catch(e){
      console.error('Fetch error:',e);
      status.textContent='Error: '+e.message;
    }
  }
  
  function mergeRaidData(existing,newData){
    console.log('MERGE: existing:', !!existing, 'newData:', !!newData);
    if(!existing){
      console.log('MERGE: No existing data, returning new data');
      return newData;
    }
    
    const playerMap=new Map();
    
    // Load existing players
    for(const p of existing.players){
      playerMap.set(p.name,JSON.parse(JSON.stringify(p))); // Deep copy
    }
    
    // Merge new players
    for(const p of newData.players){
      if(!playerMap.has(p.name)){
        playerMap.set(p.name,JSON.parse(JSON.stringify(p)));
      }else{
        const existing=playerMap.get(p.name);
        
        // Merge bosses - keep best parse for each boss+difficulty combo
        for(const newBoss of p.bosses){
          // Find matching boss by name, encounterID, AND difficulty
          const existingBoss=existing.bosses.find(b=>
            b.boss===newBoss.boss&&b.encounterID===newBoss.encounterID&&b.difficulty===newBoss.difficulty
          );
          
          if(!existingBoss){
            // New boss kill, add it
            existing.bosses.push(newBoss);
          }else if(newBoss.parse>existingBoss.parse){
            // Better parse, replace it
            Object.assign(existingBoss,newBoss);
          }
          // Otherwise keep existing (it's better or equal)
        }
        
        // Recalculate avg and best parse
        const avg=existing.bosses.reduce((s,b)=>s+b.parse,0)/existing.bosses.length;
        const best=existing.bosses.reduce((max,b)=>b.parse>max.parse?b:max,{parse:0,boss:''});
        existing.avgParse=Math.round(avg);
        existing.bestParse=best;
      }
    }
    
    // Merge fights list (dedupe by encounterID + difficulty)
    const fightMap=new Map();
    for(const f of existing.fights){
      const key=`${f.encounterID}-${f.difficulty}`;
      fightMap.set(key,f);
    }
    for(const f of newData.fights){
      const key=`${f.encounterID}-${f.difficulty}`;
      if(!fightMap.has(key)){
        fightMap.set(key,f);
      }
    }
    
    // Merge performance data (dedupe by encounterID + difficulty)
    const perfMap=new Map();
    if(existing.performance){
      for(const p of existing.performance){
        const key=`${p.encounterID}-${p.difficulty}`;
        perfMap.set(key,p);
      }
    }
    if(newData.performance){
      for(const p of newData.performance){
        const key=`${p.encounterID}-${p.difficulty}`;
        if(!perfMap.has(key)){
          perfMap.set(key,p);
        }
      }
    }
    
    const result={
      updated:new Date().toISOString(),
      players:Array.from(playerMap.values()),
      fights:Array.from(fightMap.values()),
      performance:Array.from(perfMap.values())
    };
    
    console.log('MERGE: Result - players:', result.players.length, 'fights:', result.fights.length, 'performance:', result.performance.length);
    
    return result;
  }
  
  function renderPreview(){
    content.innerHTML='';
    content.appendChild(h("div",{style:{marginTop:"16px"}},
      h("div",{style:{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}},"Found "+reportData.players.length+" players across "+reportData.fights.length+" boss kills"),

function getActiveDifficulty(){
  if(!RAID_DATA||!RAID_DATA.fights)return null;
  
  // Count boss kills per difficulty
  const killsByDiff={5:0,4:0,3:0};
  const seenBosses={5:new Set(),4:new Set(),3:new Set()};
  
  for(const fight of RAID_DATA.fights){
    const diff=fight.difficulty;
    // Skip if difficulty is invalid
    if(!diff||!seenBosses[diff]){
      console.log('Invalid difficulty for fight:',fight.name,diff);
      continue;
    }
    const key=`${fight.encounterID}`;
    if(!seenBosses[diff].has(key)){
      seenBosses[diff].add(key);
      killsByDiff[diff]++;
    }
  }
  
  // Return highest difficulty with 2+ kills
  if(killsByDiff[5]>=2)return 5; // Mythic
  if(killsByDiff[4]>=2)return 4; // Heroic
  if(killsByDiff[3]>=2)return 3; // Normal
  return null;
}

function renderPower(){
  const dungeons=getAllDungeons(S.chars);
  const ranked=S.chars.map(c=>{
    const rio=c.mythic_plus_scores_by_season?.[0]?.scores?.all||0;
    const r=c.raid_progression?.[RAID_TIER];
    const mk=r?.mythic_bosses_killed||0,hk=r?.heroic_bosses_killed||0,nk=r?.normal_bosses_killed||0;
    const ilvl=c.gear?.item_level_equipped||0;
    const issues=auditGear(c);
    const tier=countTier(c);
    const runs=getDungeonRuns(c);
    const timedCount=runs.filter(r=>r.num_keystone_upgrades>0).length;
    const highestKey=runs.length?Math.max(...runs.map(r=>r.mythic_level)):0;
    
    // Get raid parse data and top 500 count
    let raidParse=0;
    let bestParse=null;
    let top500Count=0;
    let top100Count=0;
    if(RAID_DATA){
      const pd=RAID_DATA.players.find(p=>p.name.toLowerCase()===c.name.toLowerCase());
      if(pd){
        // Count top 500 and top 100 parses
        for(const b of pd.bosses){
          if(!b.rank)continue;
          const rankNum=parseInt(String(b.rank).replace('~',''));
          if(!isNaN(rankNum)){
            if(rankNum<=500)top500Count++;
            if(rankNum<=100)top100Count++;
          }
        }
        
        // Get parse from highest difficulty with 2+ kills
        const byDiff={};
        for(const b of pd.bosses){
          const fight=RAID_DATA.fights.find(f=>f.encounterID===b.encounterID&&f.name===b.boss);
          if(!fight)continue;
          const diff=fight.difficulty;
          if(!byDiff[diff])byDiff[diff]=[];
          byDiff[diff].push(b);
        }
        
        // Check Mythic (5), then Heroic (4), then Normal (3)
        for(const diff of [5,4,3]){
          if(byDiff[diff]&&byDiff[diff].length>=2){
            const avg=byDiff[diff].reduce((s,b)=>s+b.parse,0)/byDiff[diff].length;
            raidParse=Math.round(avg);
            const best=byDiff[diff].reduce((max,b)=>b.parse>max.parse?b:max,{parse:0,boss:''});
            bestParse=best;
            break;
          }
        }
        
        // Fallback: if no difficulty has 2+ kills, use overall average
        if(raidParse===0&&pd.bosses.length>0){
          raidParse=pd.avgParse||0;
          bestParse=pd.bestParse;
        }
      }
    }
    
    // GPS calculation - M+ focused but raid matters
    const raidPts=mk*100+hk*15+nk*2; // legacy raid prog bonus
    const parsePts=Math.round(raidParse*2); // raid parse: 0-200 points (avg parse % * 2)
    // Top 100/500 ranks removed from GPS - parse % is the performance metric
    const rioPts=Math.round(rio*0.15); // M+ score: slightly more weight
    const ilvlPts=Math.round(Math.max(0,ilvl-220)*1.8);
    const enchantPts=issues.length===0?50:Math.max(0,50-issues.length*7);
    const tierPts=tier>=4?40:tier>=2?20:0;
    const keyPts=timedCount*8+Math.max(0,highestKey-5)*5;
    const pts=raidPts+parsePts+rioPts+ilvlPts+enchantPts+tierPts+keyPts;
    return{c,rio,r,ilvl,issues,tier,runs,timedCount,highestKey,pts,raidParse,bestParse,top500Count,top100Count};
  }).filter(x=>x.pts>0).sort((a,b)=>b.pts-a.pts).slice(0,30);
  const maxPts=ranked[0]?.pts||1;

  return h("div",null,
    renderGuildPulse(),
    h("div",{style:{marginBottom:"18px",padding:"14px 18px",background:"var(--card)",borderRadius:"10px",border:"1px solid var(--border)"}},
      h("div",{style:{fontSize:"11px",color:"var(--faint)",letterSpacing:"1px",marginBottom:"8px",fontWeight:"700"}},"GUILD POWER SCORE"),
      h("div",{style:{display:"flex",gap:"18px",flexWrap:"wrap",fontSize:"13px",color:"var(--muted)"}},
        h("span",{style:{color:"#a335ee"}},"Raid"),
        h("span",{style:{color:rioColor(2000)}},"M+ Score"),
        h("span",{style:{color:"rgba(255,255,255,0.5)"}},"iLvl"),
        h("span",{style:{color:"#4ade80"}},"Enchants"),
        h("span",{style:{color:"var(--accent)"}},"Tier Set"),
        h("span",{style:{color:"#60a5fa"}},"Keys Timed"),
        RAID_DATA?h("span",{style:{color:"#ff8800"}},"Parse %"):null
      )
    ),
    ...ranked.map((x,i)=>{
      const pct=Math.round((x.pts/maxPts)*100);
      const barCol=CC[x.c.class]||"#555";
      const keySquares=dungeons.map(([sn,name])=>{
        const k=getBestKey(x.c,sn);
        if(!k)return h("div",{class:"ksq",style:{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.1)",width:"26px",minWidth:"26px",height:"20px"}},"-",h("div",{class:"tt"},name+" — Not run"));
        const kc=keyColor(k.level,k.timed);
        return h("div",{class:"ksq",style:{background:kc.bg,color:kc.fg}},""+k.level,h("div",{class:"tt"},name+" +"+k.level+(k.timed?" timed":" depleted")));
      });
      
      // Parse color based on percentile
      function parseColor(p){
        if(p>=99)return"#ff8000";
        if(p>=95)return"#a335ee";
        if(p>=75)return"#0070dd";
        if(p>=50)return"#1eff00";
        return"rgba(255,255,255,0.5)";
      }

      return h("div",{class:"card",style:{display:"flex",gap:"14px",alignItems:"flex-start",borderLeft:"3px solid "+(i<3?["#FF9900","#C0C0C0","#CD7F32"][i]:"transparent")}},
        rankBadge(i),
        h("div",{style:{flex:"1",minWidth:"0"}},
          h("div",{style:{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"3px"}},
            clickName(x.c,{fontSize:"17px",fontWeight:"700",color:CC[x.c.class]||"#fff"}),
            h("span",{style:{fontSize:"22px",fontWeight:"900",color:i===0?"var(--accent)":i<3?"#fff":"rgba(255,255,255,0.75)"}},x.pts+""),
            h("span",{style:{fontSize:"11px",color:"var(--faint)",marginLeft:"-6px",fontWeight:"600"}},"GPS")
          ),
          h("div",{style:{fontSize:"13px",color:"var(--muted)",marginBottom:"8px"}},x.c.active_spec_name+" "+x.c.class),
          h("div",{style:{height:"5px",borderRadius:"3px",background:"rgba(255,255,255,0.04)",width:"100%",marginBottom:"8px"}},
            h("div",{style:{height:"100%",borderRadius:"3px",background:barCol,width:pct+"%",transition:"width .5s ease-out"}})
          ),
          h("div",{style:{display:"flex",gap:"8px",alignItems:"center",fontSize:"12px",flexWrap:"wrap",marginBottom:keySquares.length?"8px":"0"}},
            x.r?h("span",{style:{color:"#a335ee",fontWeight:"600"}},x.r.summary):null,
            x.rio>0?h("span",{class:"tg io",style:{background:rioColor(x.rio)+"22",color:rioColor(x.rio)}},Math.round(x.rio)+" io"):null,
            h("span",{style:{color:ilvlColor(Math.round(x.ilvl)),fontWeight:"700"}},Math.round(x.ilvl)+" ilvl"),
            x.tier>=4?h("span",{class:"tg tier"},"4pc"):x.tier>=2?h("span",{class:"tg tier"},"2pc"):null,
            x.issues.length===0?h("span",{class:"tg good"},"\u2713 Enchanted"):h("span",{class:"tg bad"},x.issues.length+" missing"),
            x.highestKey>0?h("span",{style:{color:keyColor(x.highestKey,true).fg,fontWeight:"700"}},"+"+x.highestKey+" best"):null,
            x.raidParse>0?h("span",{class:"tg",style:{background:parseColor(x.raidParse)+"22",color:parseColor(x.raidParse)}},x.raidParse+"% avg"):null,
            x.bestParse&&x.bestParse.parse>0?h("span",{class:"tg",style:{background:parseColor(x.bestParse.parse)+"15",color:parseColor(x.bestParse.parse),border:"1px solid "+parseColor(x.bestParse.parse)+"44"}},x.bestParse.parse+"% "+x.bestParse.boss.split(',')[0]):null,
            x.top100Count>0?h("span",{style:{fontSize:"11px",fontWeight:"700",color:"#fbbf24",background:"rgba(251,191,36,0.15)",padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(251,191,36,0.3)"}},"\u2B50 "+x.top100Count+"x Top 100"):null,
            x.top500Count>0&&x.top100Count===0?h("span",{style:{fontSize:"11px",fontWeight:"700",color:"#a78bfa",background:"rgba(167,139,250,0.15)",padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(167,139,250,0.3)"}},"\u{1F525} "+x.top500Count+"x Top 500"):null
          ),
          keySquares.length?h("div",{style:{display:"flex",gap:"3px",alignItems:"center",height:"20px"}},
            h("span",{style:{fontSize:"10px",color:"var(--faint)",marginRight:"3px",fontWeight:"600"}},"KEYS"),
            ...keySquares
          ):null
        )
      );
    })
  );
}

function renderInsights(){

    return h("div",{class:"empty"},"No insights available yet. Run some keys!");
  }
  
  const container=h("div");
  
  // Group insights by category
  const raidInsights=S.insights.filter(i=>i.category==='raid');
  const keyInsights=S.insights.filter(i=>!i.category||i.category==='keys');
  
  // Render raid insights if they exist
  if(raidInsights.length>0){
    container.appendChild(h("div",{class:"sec"},"RAID PERFORMANCE"));
    const raidGrid=h("div",{class:"insights-grid"});
    for(const insight of raidInsights){
      const card=h("div",{class:"insight-card",style:{borderLeftColor:insight.color||"var(--accent)"}});
      
      const titleDiv=h("div",{class:"insight-title",style:{color:insight.color||"var(--accent)"}});
      if(insight.emoji){
        titleDiv.appendChild(h("span",{class:"insight-emoji"},insight.emoji));
      }
      titleDiv.appendChild(h("span",null,insight.title));
      card.appendChild(titleDiv);
      
      card.appendChild(h("div",{class:"insight-body"},insight.body));
      
      if(insight.stat){
        card.appendChild(h("div",{class:"insight-stat",style:{color:insight.color||"var(--text)"}},insight.stat));
        if(insight.label){
          card.appendChild(h("div",{class:"insight-label"},insight.label));
        }
      }
      
      if(insight.items){
        const itemGrid=h("div",{class:"insight-grid"});
        for(const item of insight.items){
          itemGrid.appendChild(h("div",{class:"insight-item"},
            h("div",{class:"insight-item-name"},item.name),
            h("div",{class:"insight-item-stat"},item.stat)
          ));
        }
        card.appendChild(itemGrid);
      }
      
      raidGrid.appendChild(card);
    }
    container.appendChild(raidGrid);
  }
  
  // Render M+ insights if they exist
  if(keyInsights.length>0){
    container.appendChild(h("div",{class:"sec",style:{marginTop:"32px"}},"MYTHIC+ HIGHLIGHTS"));
    const keyGrid=h("div",{class:"insights-grid"});
    for(const insight of keyInsights){
      const card=h("div",{class:"insight-card",style:{borderLeftColor:insight.color||"var(--accent)"}});
      
      const titleDiv=h("div",{class:"insight-title",style:{color:insight.color||"var(--accent)"}});
      if(insight.emoji){
        titleDiv.appendChild(h("span",{class:"insight-emoji"},insight.emoji));
      }
      titleDiv.appendChild(h("span",null,insight.title));
      card.appendChild(titleDiv);
      
      card.appendChild(h("div",{class:"insight-body"},insight.body));
      
      if(insight.stat){
        card.appendChild(h("div",{class:"insight-stat",style:{color:insight.color||"var(--text)"}},insight.stat));
        if(insight.label){
          card.appendChild(h("div",{class:"insight-label"},insight.label));
        }
      }
      
      if(insight.items){
        const itemGrid=h("div",{class:"insight-grid"});
        for(const item of insight.items){
          itemGrid.appendChild(h("div",{class:"insight-item"},
            h("div",{class:"insight-item-name"},item.name),
            h("div",{class:"insight-item-stat"},item.stat)
          ));
        }
        card.appendChild(itemGrid);
      }
      
      keyGrid.appendChild(card);
    }
    container.appendChild(keyGrid);
  }
  
  return container;
}

// TAB 4: RAID LOGS
// ═══════════════════════════════════════
function renderRaidLogs(){
  console.log('renderRaidLogs called, RAID_DATA:', RAID_DATA);
  
  if(!RAID_DATA)return h("div",{class:"empty"},
    h("div",{style:{marginBottom:"12px"}},"No raid data loaded yet"),
    h("div",{style:{fontSize:"13px",color:"var(--faint)"}},"Use the Update Raid Logs button to fetch data")
  );
  
  console.log('RAID_DATA exists, building view...');
  
  const updated=new Date(RAID_DATA.updated);
  const dateStr=updated.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  
  function parseColor(p){
    if(p>=99)return"#e268a8"; // Pink for 99+ (WCL standard)
    if(p>=95)return"#a335ee"; // Purple for 95-98
    if(p>=75)return"#0070dd"; // Blue for 75-94
    if(p>=50)return"#1eff00"; // Green for 50-74
    return"rgba(255,255,255,0.5)";
  }
  
  const diffNames={3:'N',4:'H',5:'M'};
  
  console.log('Building top 500 parses...');
  
  // Build detailed top 500 parse list - only best parse per player per boss
  const parsesByPlayerBoss=new Map();
  for(const p of RAID_DATA.players){
    for(const b of p.bosses){
      if(!b.rank)continue;
      const rankNum=parseInt(String(b.rank).replace('~',''));
      if(!isNaN(rankNum)&&rankNum<=500){
        const key=`${p.name}-${b.encounterID}`;
        const existing=parsesByPlayerBoss.get(key);
        if(!existing||rankNum<existing.rank){
          parsesByPlayerBoss.set(key,{
            player:p.name,
            class:p.class,
            boss:b.boss,
            difficulty:b.difficulty, // Use difficulty from boss object directly
            parse:b.parse,
            rank:rankNum,
            spec:b.spec
          });
        }
      }
    }
  }
  const top500Parses=Array.from(parsesByPlayerBoss.values()).sort((a,b)=>a.rank-b.rank);
  
  console.log('Top 500 parses:', top500Parses.length);
  console.log('Building player stats...');
  
  const activeDiff=getActiveDifficulty();
  console.log('Active difficulty for Raid Logs:', activeDiff);
  
  // Build player raid stats - only for active difficulty
  const raidStats=RAID_DATA.players.map(p=>{
    // Filter bosses to active difficulty only
    const activeBosses=p.bosses.filter(b=>b.difficulty===activeDiff);
    
    if(activeBosses.length===0)return null;
    
    // Count kills (just the number of bosses in active difficulty)
    const killCount=activeBosses.length;
    
    // Get avg parse from active difficulty
    const avgParse=Math.round(activeBosses.reduce((s,b)=>s+b.parse,0)/activeBosses.length);
    
    // Get best parse from active difficulty
    const bestBoss=activeBosses.reduce((max,b)=>b.parse>max.parse?b:max,{parse:0,boss:''});
    
    // Count top 500 and top 100 (from active difficulty only)
    let top500=0,top100=0;
    for(const b of activeBosses){
      if(!b.rank)continue;
      const rankNum=parseInt(String(b.rank).replace('~',''));
      if(!isNaN(rankNum)){
        if(rankNum<=500)top500++;
        if(rankNum<=100)top100++;
      }
    }
    
    return{
      name:p.name,
      class:p.class,
      role:p.role,
      spec:activeBosses[0]?.spec||'',
      avgParse,
      bestParse:bestBoss,
      kills:killCount,
      top500,
      top100
    };
  }).filter(p=>p!==null);
  
  // Sort by: kill count desc, then avg parse desc
  raidStats.sort((a,b)=>{
    if(a.kills!==b.kills)return b.kills-a.kills;
    return b.avgParse-a.avgParse;
  });
  
  const top30=raidStats.slice(0,30);
  
  console.log('Top 30 raiders:', top30.length);
  console.log('Building elements...');
  
  const elements=[];
  
  // Parse Elite section - compact like Keystone Heroes
  if(top500Parses.length>0){
    // Build name->class map
    const playerClasses=new Map();
    for(const p of top500Parses){
      playerClasses.set(p.player,p.class);
    }
    
    const top100Names=new Set();
    const top500Names=new Set();
    for(const p of top500Parses){
      if(p.rank<=100)top100Names.add(p.player);
      else top500Names.add(p.player);
    }
    
    // Build colored name spans
    const top100Sorted=Array.from(top100Names).sort();
    const top500Sorted=Array.from(top500Names).sort();
    const nameSpans=[];
    
    top100Sorted.forEach((name,i)=>{
      if(i>0)nameSpans.push(h("span",null,", "));
      nameSpans.push(h("span",{style:{color:CC[playerClasses.get(name)]||"#fff"}},name));
    });
    
    if(top100Sorted.length>0&&top500Sorted.length>0){
      nameSpans.push(h("span",null,", "));
    }
    
    top500Sorted.forEach((name,i)=>{
      if(i>0)nameSpans.push(h("span",null,", "));
      nameSpans.push(h("span",{style:{color:CC[playerClasses.get(name)]||"#fff"}},name));
    });
    
    elements.push(h("div",{style:{marginBottom:"20px",padding:"14px 20px",borderRadius:"10px",background:"linear-gradient(135deg, rgba(226,104,168,0.06) 0%, rgba(163,53,238,0.05) 100%)",border:"1px solid rgba(226,104,168,0.15)"}},
      h("div",{style:{fontSize:"11px",color:"#e268a8",fontWeight:"700",letterSpacing:"1px",marginBottom:"5px"}},"PARSE ELITE"),
      h("div",{style:{fontSize:"14px",fontWeight:"600"}},...nameSpans),
      h("div",{style:{fontSize:"12px",color:"#e268a8",marginTop:"4px"}},
        top500Parses.length+" top 500 "+(top500Parses.length===1?"parse":"parses")+(top100Names.size>0?" ("+top100Names.size+" top 100)":"")
      )
    ));
  }
  
  // Stats header
  const diffName={3:'Normal',4:'Heroic',5:'Mythic'}[activeDiff]||'';
  
  // Calculate time ago
  const now=new Date();
  const diff=now-updated;
  const hours=Math.floor(diff/(1000*60*60));
  const days=Math.floor(hours/24);
  let timeAgo;
  if(days>0)timeAgo=days+" day"+(days===1?"":"s")+" ago";
  else if(hours>0)timeAgo=hours+" hour"+(hours===1?"":"s")+" ago";
  else timeAgo="just now";
  
  elements.push(h("div",{style:{marginBottom:"20px",padding:"14px 18px",background:"var(--card)",borderRadius:"10px",border:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"10px"}},
    h("div",null,
      h("div",{style:{fontSize:"11px",color:"var(--faint)",letterSpacing:"1px",fontWeight:"700",marginBottom:"4px"}},"TOP RAIDERS"),
      h("div",{style:{fontSize:"13px",color:"var(--muted)"}},top30.length+" raiders ranked by progression + performance"),
      h("div",{style:{fontSize:"12px",color:"#a335ee",marginTop:"4px",fontWeight:"600"}},"Showing "+diffName+" difficulty only")
    ),
    h("div",{style:{fontSize:"12px",color:"var(--muted)"}},
      "\u{1F4C5} Updated ",
      h("span",{style:{color:"var(--text)",fontWeight:"600"}},timeAgo)
    )
  ));
  
  // Player cards (raid metrics only)
  const diffLabel={3:'N',4:'H',5:'M'}[activeDiff]||'';
  
  // Get all unique bosses from fights in active difficulty
  const allBosses=[];
  if(RAID_DATA&&activeDiff){
    const seen=new Set();
    for(const fight of RAID_DATA.fights){
      if(fight.difficulty===activeDiff){
        const key=`${fight.encounterID}-${fight.name}`;
        if(!seen.has(key)){
          seen.add(key);
          allBosses.push({name:fight.name,encounterID:fight.encounterID});
        }
      }
    }
  }
  
  for(const [i,p] of top30.entries()){
    // Get full player data from RAID_DATA to access bosses array
    const playerData=RAID_DATA.players.find(pd=>pd.name===p.name);
    
    // Build boss squares
    const bossSquares=allBosses.map(boss=>{
      const bossKill=playerData?.bosses?.find(b=>b.encounterID===boss.encounterID&&b.difficulty===activeDiff);
      if(!bossKill){
        return h("div",{
          class:"ksq",
          style:{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.15)",width:"32px",minWidth:"32px",height:"24px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"600"}
        },"-",h("div",{class:"tt"},boss.name+" — Not killed"));
      }
      
      const parseCol=parseColor(bossKill.parse);
      return h("div",{
        class:"ksq",
        style:{background:parseCol+"22",color:parseCol,width:"32px",minWidth:"32px",height:"24px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"700",border:"1px solid "+parseCol+"44"}
      },String(bossKill.parse||0),h("div",{class:"tt"},boss.name+" — "+bossKill.parse+"% parse"));
    });
    
    elements.push(h("div",{class:"card",style:{display:"flex",gap:"14px",alignItems:"flex-start",borderLeft:"3px solid "+(i<3?["#FF9900","#C0C0C0","#CD7F32"][i]:"transparent")}},
      h("div",{style:{width:"32px",height:"32px",borderRadius:"50%",background:"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"700",color:i<3?"var(--accent)":"var(--faint)",flexShrink:"0"}},String(i+1)),
      h("div",{style:{flex:"1",minWidth:"0"}},
        h("div",{style:{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"3px",flexWrap:"wrap"}},
          h("span",{style:{fontSize:"17px",fontWeight:"700",color:CC[p.class]||"#fff"}},p.name),
          p.avgParse>0?h("span",{class:"tg",style:{background:parseColor(p.avgParse)+"22",color:parseColor(p.avgParse),fontWeight:"700",fontSize:"14px"}},p.avgParse+"% avg"):null
        ),
        h("div",{style:{fontSize:"13px",color:"var(--muted)",marginBottom:"8px"}},p.spec+(p.spec?" ":"")+p.class),
        allBosses.length>0?h("div",{style:{display:"flex",gap:"4px",marginBottom:"8px",flexWrap:"wrap"}},...bossSquares):null,
        h("div",{style:{display:"flex",gap:"8px",alignItems:"center",fontSize:"12px",flexWrap:"wrap"}},
          h("span",{style:{color:"#a335ee",fontWeight:"600"}},p.kills+diffLabel),
          p.bestBoss&&p.bestBoss.parse>0&&p.bestBoss.boss?h("span",{class:"tg",style:{background:parseColor(p.bestBoss.parse)+"15",color:parseColor(p.bestBoss.parse),border:"1px solid "+parseColor(p.bestBoss.parse)+"44"}},p.bestBoss.parse+"% "+p.bestBoss.boss.split(',')[0]):null,
          p.top100>0?h("span",{style:{fontSize:"11px",fontWeight:"700",color:"#fbbf24",background:"rgba(251,191,36,0.15)",padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(251,191,36,0.3)"}},"\u2B50 "+p.top100+"x Top 100"):null,
          p.top500>0&&p.top100===0?h("span",{style:{fontSize:"11px",fontWeight:"700",color:"#a78bfa",background:"rgba(167,139,250,0.15)",padding:"4px 8px",borderRadius:"4px",border:"1px solid rgba(167,139,250,0.3)"}},"\u{1F525} "+p.top500+"x Top 500"):null
        )
      )
    ));
  }
  
  console.log('Total elements:', elements.length);
  console.log('Returning...');
  
  const container=h("div",null);
  for(const el of elements){
    if(el)container.appendChild(el);
  }
  return container;
}

    ),
    h("div",{class:"h-stats"},
      ...[{l:"RAIDERS",v:raidersN},{l:"ROSTER",v:S.chars.length},{l:"AVG R.IO",v:avgRio||"-"},{l:"TANKS",v:S.chars.filter(c=>c.active_spec_role==="TANK").length},{l:"HEALERS",v:S.chars.filter(c=>c.active_spec_role==="HEALING").length},{l:"DPS",v:S.chars.filter(c=>c.active_spec_role==="DPS").length}].map(s=>
        h("div",{class:"h-stat"},h("div",{class:"v"},""+s.v),h("div",{class:"l"},s.l))
      )
    )
  ));
  const tabNames=["Power Rankings","Raid Logs","Keystone Progress","Gear Check","Insights"];
  app.appendChild(h("div",{class:"tabs"},...tabNames.map((t,i)=>h("button",{class:"tab "+(S.tab===i?"active":""),onclick:()=>set({tab:i})},t))));
  const content=h("div",{class:"content"});
  if(S.tab===0)content.appendChild(renderPower());
  else if(S.tab===1){
    try{
      content.appendChild(renderRaidLogs());
    }catch(e){
      console.error('renderRaidLogs error:', e);
      content.appendChild(h("div",{class:"empty"},
        h("div",{style:{marginBottom:"12px"}},"Error loading raid logs"),
        h("div",{style:{fontSize:"13px",color:"var(--faint)"}},e.toString())
      ));
    }
  }
  else if(S.tab===2)content.appendChild(renderKeys());
  else if(S.tab===3)content.appendChild(renderGear());
  else if(S.tab===4)content.appendChild(renderInsights());
  app.appendChild(content);
  app.appendChild(h("div",{class:"footer"},"RFB HUB \u00b7 LIVE VIA RAIDER.IO"));
}
render();loadAll();
</script>
</body>
</html>
