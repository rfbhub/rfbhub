// NEW SIMPLIFIED RAID LOGS - Fetches directly from character profiles
function renderRaidLogsNew(){
  const container = h("div", {class: "raid-logs-container"});

  // Difficulty selector
  const difficultyState = {current: selectedDifficulty};
  const partitionState = {current: selectedPartition};

  const DIFF_NAMES = {3: 'Normal', 4: 'Heroic', 5: 'Mythic'};
  const DIFF_COLORS = {3: '#1eff00', 4: '#a335ee', 5: '#ff8000'};

  // Helper: get the difficulties object for the active partition
  function getActiveDiffs(){
    if(wclDataCache?.partitions && partitionState.current){
      return wclDataCache.partitions[partitionState.current]?.difficulties || {};
    }
    return wclDataCache?.difficulties || {};
  }

  let diffSelector;
  let loadingEl;
  let dataEl;
  let statsEl;
  let titleEl;

  function rebuildUI(){
    container.innerHTML = "";

    const activeDiffs = getActiveDiffs();
    const isCached = wclDataCache && wclDataCache.updated;
    const lastUpdated = isCached ? new Date(wclDataCache.updated).toLocaleString() : null;
    const currentDiffName = DIFF_NAMES[difficultyState.current] || 'Heroic';
    const partitionLabels = wclDataCache?.partitions ? Object.keys(wclDataCache.partitions) : [];
    const hasMultiplePartitions = partitionLabels.length > 1;

    // Header with title, partition toggle, and difficulty buttons
    const header = h("div", {style: {
      padding: "20px",
      background: "var(--card)",
      borderRadius: "12px",
      marginBottom: "20px",
      border: "1px solid var(--border)"
    }},
      h("div", {style: {
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        flexWrap: "wrap",
        gap: "12px"
      }},
        h("div", {},
          titleEl = h("div", {style: {fontSize: "18px", fontWeight: "700", marginBottom: "4px"}}, currentDiffName + " Raid Parses"),
          h("div", {style: {fontSize: "12px", color: "var(--muted)"}},
            isCached
              ? "Midnight Falls • Updated " + lastUpdated
              : "Midnight Falls • Loading from Warcraft Logs..."
          )
        ),
        h("div", {style: {display: "flex", alignItems: "center", gap: "16px"}},
          // Partition toggle (only if multiple partitions exist)
          hasMultiplePartitions ? h("div", {style: {display: "flex", alignItems: "center", gap: "4px", background: "rgba(255,255,255,0.05)", borderRadius: "6px", padding: "2px"}},
            ...partitionLabels.map(label => {
              const isActive = partitionState.current === label;
              const pData = wclDataCache.partitions[label];
              const pTotal = Object.values(pData.difficulties || {}).reduce((s, d) => s + (d.raiders?.length || 0), 0);
              return h("button", {
                onclick: () => {
                  if(partitionState.current !== label){
                    partitionState.current = label;
                    selectedPartition = label;
                    // Reset difficulty to this partition's default
                    difficultyState.current = pData.defaultDifficulty || 4;
                    selectedDifficulty = difficultyState.current;
                    rebuildUI();
                    loadRaidData();
                  }
                },
                style: {
                  padding: "4px 10px",
                  borderRadius: "4px",
                  border: "none",
                  background: isActive ? "var(--accent)" : "transparent",
                  color: isActive ? "#000" : "var(--muted)",
                  fontSize: "10px",
                  fontWeight: "700",
                  cursor: "pointer",
                  transition: "all 0.2s",
                  letterSpacing: "0.5px"
                },
                title: pTotal + " raiders logged"
              }, label.toUpperCase());
            })
          ) : null,
          // Difficulty toggle buttons
          h("div", {style: {display: "flex", alignItems: "center", gap: "8px"}},
            ...[3, 4, 5].map(diffId => {
              const isActive = difficultyState.current === diffId;
              const hasData = activeDiffs[diffId]?.raiders?.length > 0;
              return h("button", {
                onclick: () => {
                  if(hasData && difficultyState.current !== diffId){
                    difficultyState.current = diffId;
                    selectedDifficulty = diffId;
                    rebuildUI();
                    loadRaidData();
                  }
                },
                style: {
                  padding: "6px 12px",
                  borderRadius: "6px",
                  border: "none",
                  background: isActive ? DIFF_COLORS[diffId] : "rgba(255,255,255,0.1)",

                  fontWeight: "700",

            })

    loadingEl = h("div", {id: "raid-loading", style: {
      padding: "40px",
      textAlign: "center",
      color: "var(--muted)"

        border: "1px solid var(--border)",
        borderLeft: `4px solid ${CC[raider.class] || "var(--accent)"}`
      }},

          alignItems: "center",
          marginBottom: "14px",
          gap: "12px"
        }},
          h("a", {
            href: `https://www.warcraftlogs.com/character/us/${raider.realm}/${raider.name.toLowerCase()}?zone=46`,
            target: "_blank",
            style: {
              fontSize: "18px",
              fontWeight: "700",
              color: CC[raider.class] || "var(--text)",
              textDecoration: "none"
            }
          }, raider.name),
          h("div", {style: {
            display: "flex",
            alignItems: "center",
            gap: "12px",
            marginLeft: "auto"
          }},
            h("div", {style: {
              padding: "4px 12px",
              borderRadius: "6px",
              background: parseColor(raider.avgParse),
              color: raider.avgParse >= 25 ? "#000" : "#fff",
              fontSize: "14px",
              fontWeight: "700"
            }}, `${raider.avgParse}% avg`),
            h("div", {style: {

            }}, `${raider.bossCount}/9 ${DIFF_NAMES[difficultyState.current]?.charAt(0) || 'H'}`)

        ),

            );

            if(bossKill){
              return h("a", {

                  borderRadius: "8px",

                  fontWeight: "600",

                  fontWeight: "900",

                  fontSize: "10px",
                  fontWeight: "500",
                  opacity: "0.7",
                  textAlign: "center"
                }}, `${shortSpec(bossKill.spec)} · ${formatDps(bossKill.dps)}`)
              );
            } else {
              return h("div", {
                style: {
                  padding: "10px 12px",
                  borderRadius: "8px",
                  background: "rgba(255,255,255,0.05)",

                  display: "flex",
                  flexDirection: "column",
                  alignItems: "center",
                  justifyContent: "center",
                  minWidth: "90px",
                  minHeight: "62px",
                  gap: "2px"
                }
              },
                h("div", {style: {
                  fontSize: "10px",
                  fontWeight: "600",
                  color: "rgba(255,255,255,0.3)",
                  textAlign: "center"
                }}, raidBoss.short),
                h("div", {style: {
                  fontSize: "11px",
                  fontWeight: "500",
                  color: "rgba(255,255,255,0.15)",
                  textAlign: "center"
                }}, "No kill")
              );
            }
          })
        )
      );

      dataEl.appendChild(card);
    }
  }

  // Load data from cache
  function loadRaidData(){
    loadingEl.style.display = "block";
    dataEl.innerHTML = "";

    const activeDiffs = getActiveDiffs();
    const diffData = activeDiffs[difficultyState.current];
    if(diffData && diffData.raiders && diffData.raiders.length > 0){
      loadingEl.style.display = "none";
      renderRaidersFromCache({difficulties: activeDiffs, updated: wclDataCache?.updated});
      return;
    }

    loadingEl.style.display = "none";

    // Check if WCL data is stale or empty across ALL difficulties
    const totalRaiders = wclDataCache ? Object.values(activeDiffs).reduce((sum, d) => sum + (d.raiders?.length || 0), 0) : 0;
    const updated = wclDataCache?.updated ? new Date(wclDataCache.updated) : null;
    const ageHours = updated ? Math.floor((Date.now() - updated.getTime()) / 3600000) : null;
    const isStale = ageHours !== null && ageHours >= 6;

    if(totalRaiders === 0 && wclDataCache){
      // WCL data file exists but is completely empty - likely a WCL outage
      const timeStr = updated ? updated.toLocaleString() : 'unknown';
      dataEl.appendChild(h("div",{style:{padding:"30px 24px",background:"rgba(248,113,113,0.06)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:"12px",textAlign:"center"}},
        h("div",{style:{fontSize:"16px",fontWeight:"700",color:"#f87171",marginBottom:"8px"}},"Warcraft Logs Data Unavailable"),
        h("div",{style:{fontSize:"13px",color:"var(--muted)",lineHeight:"1.6",maxWidth:"480px",margin:"0 auto"}},
          "WCL returned no parse data on the last fetch. This usually means Warcraft Logs is experiencing an outage or maintenance. Data refreshes automatically every 2 hours."
        ),
        h("div",{style:{fontSize:"11px",color:"var(--faint)",marginTop:"12px"}},"Last checked: " + timeStr + (isStale ? " (" + ageHours + "h ago)" : ""))
      ));
    } else if(!wclDataCache){
      dataEl.innerHTML = "<div style='padding:40px;text-align:center;color:var(--muted)'>Raid log data has not been loaded yet. Try refreshing.</div>";
    } else {
      dataEl.innerHTML = "<div style='padding:40px;text-align:center;color:var(--muted)'>No raid data found for this difficulty</div>";
    }
  }

  // Auto-load on render
  setTimeout(loadRaidData, 100);

  return container;
}

function formatDps(n){
  if(!n) return "";
  if(n >= 1000000) return (n/1000000).toFixed(1) + "m";
  if(n >= 1000) return (n/1000).toFixed(1) + "k";
  return Math.floor(n).toString();
}

// Clean character names - removes server IDs like "Name-123456789"
function cleanName(name){
  if(!name) return "";
  // If name has a hyphen followed by only numbers, strip it
  return name.replace(/-\d+$/, "");
}

function shortSpec(s){
  if(!s) return "";
  const abbrevs = {
    "Retribution": "Ret", "Protection": "Prot", "Holy": "Holy",
    "Frost": "Frost", "Fire": "Fire", "Arcane": "Arc",
    "Arms": "Arms", "Fury": "Fury",
    "Assassination": "Sin", "Outlaw": "Outlaw", "Subtlety": "Sub",
    "Beast Mastery": "BM", "Marksmanship": "MM", "Survival": "Surv",
    "Elemental": "Ele", "Enhancement": "Enh", "Restoration": "Resto",
    "Balance": "Bal", "Feral": "Feral", "Guardian": "Guard",
    "Shadow": "Shadow", "Discipline": "Disc",
    "Affliction": "Aff", "Demonology": "Demo", "Destruction": "Destro",
    "Blood": "Blood", "Unholy": "UH",
    "Brewmaster": "Brew", "Windwalker": "WW", "Mistweaver": "MW",
    "Havoc": "Havoc", "Vengeance": "Veng",
    "Devastation": "Dev", "Preservation": "Pres", "Augmentation": "Aug"
  };
  return abbrevs[s] || s.substring(0, 4);
}

function shortBoss(name){
  if(!name) return "";
  const cleaned = name.replace(/^(The |Imperator |High |Lord |Lady |King |Queen |Prince |Princess |General |Commander |Archbishop )/i, "");
  const firstWord = cleaned.split(" ")[0];
  return firstWord.length > 10 ? firstWord.substring(0, 9) + "…" : firstWord;
}

function parseColor(p){
  if(p >= 100) return "#e5cc80"; // Gold (artifact)
  if(p >= 99) return "#e268a8";  // Pink
  if(p >= 95) return "#ff8000";  // Orange (legendary)
  if(p >= 75) return "#a335ee";  // Purple (epic)
  if(p >= 50) return "#0070dd";  // Blue (rare)
  if(p >= 25) return "#1eff00";  // Green (uncommon)
  return "#9d9d9d";              // Gray (poor)
}
// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(S.status==="error"){app.appendChild(h("div",{class:"err"},h("div",{class:"msg"},"Failed to load"),h("div",{class:"detail"},S.error),h("button",{onclick:()=>loadAll()},"Retry")));return;}
  if(S.status!=="done"){
    app.appendChild(h("div",{class:"loading"},
      h("div",{class:"brand"},h("div",{class:"brand-r"},CONFIG.logoLeft),h("div",{class:"brand-h"},CONFIG.logoRight)),
      h("div",{class:"sub",style:{marginTop:"12px"}},S.status==="guild"?"Fetching guild roster...":"Loading "+S.progress[0]+"/"+S.progress[1]),
      S.progress[1]>0?h("div",{class:"pbar"},h("div",{class:"pfill",style:{width:(S.progress[0]/S.progress[1]*100)+"%"}})):null
    ));return;
  }
  const gr=S.guild?.raid_progression?.[RAID_TIER];



  app.appendChild(h("div",{class:"header"},
    h("div",{class:"h-row"},
      h("div",{class:"brand"},h("div",{class:"brand-r"},CONFIG.logoLeft),h("div",{class:"brand-h"},CONFIG.logoRight)),
      h("div",{class:"g-info"},
        h("div",{class:"g-name"},S.guild?.name||G_N),
        h("div",{class:"g-sub"},G_S+"-"+G_R.toUpperCase()+" · "+CONFIG.seasonName+" · "+(gr?.summary||""))
      ),
      h("button",{class:"refresh",onclick:function(){S={status:"idle",progress:[0,0],guild:null,chars:[],tab:S.tab,error:null};render();loadAll();}},"↻ Refresh"),
      (function(){
        // Hide picker on holidays
        const today = new Date();
        const m = today.getMonth() + 1, d = today.getDate();
        if((m===10&&d===31)||(m===7&&d===4)) return null;

        const active = getActiveTheme();
        const wrapper = h("div",{class:"theme-picker"});
        const btn = h("button",{class:"theme-picker-btn",onclick:function(e){
          e.stopPropagation();
          wrapper.classList.toggle('open');
        }},"🎨");
        const dropdown = h("div",{class:"theme-picker-dropdown"});
        const grid = h("div",{class:"theme-picker-grid"});
        for(const t of THEMES){
          const dot = h("div",{
            class:"theme-dot" + (active===t.id?" active":""),
            style:{background:t.id==='neon'?'linear-gradient(135deg,#ff00ff,#00ffff)':t.color},
            title:t.label,
            onclick:function(e){
              e.stopPropagation();
              applyTheme(t.id);
              wrapper.classList.remove('open');
              render();
            }
          });
          grid.appendChild(dot);
        }
        dropdown.appendChild(grid);
        wrapper.appendChild(btn);
        wrapper.appendChild(dropdown);

        // Close on outside click
        document.addEventListener('click',function closeTheme(e){
          if(!wrapper.contains(e.target)){
            wrapper.classList.remove('open');
            document.removeEventListener('click',closeTheme);
          }
        });

        return wrapper;
      })()
    )
  ));

  const tabDefs=[
    {full:"Power Rankings",short:"Rankings"},
    {full:"Raid Logs",short:"Logs"},
    {full:"Keystone Progress",short:"Keys"},
    {full:"Gear Check",short:"Gear"},
    {full:"Weekly Recap",short:"Recap"}
  ];
  app.appendChild(h("div",{class:"tabs"},...tabDefs.map((t,i)=>h("button",{class:"tab "+(S.tab===i?"active":""),onclick:()=>set({tab:i})},
    h("span",{class:"tab-full"},t.full),
    h("span",{class:"tab-short"},t.short)
  ))));
  const content=h("div",{class:"content"});
  if(S.tab===0)content.appendChild(renderPower());
  else if(S.tab===1){
    try{
      content.appendChild(renderRaidLogsNew());
    }catch(e){
      console.error('renderRaidLogs error:', e);
      content.appendChild(h("div",{class:"empty"},
        h("div",{style:{marginBottom:"12px"}},"Error loading raid logs"),
        h("div",{style:{fontSize:"13px",color:"var(--faint)"}},e.toString())
      ));
    }
  }
  else if(S.tab===2)content.appendChild(renderKeys());
  else if(S.tab===3)content.appendChild(renderGear());
  else if(S.tab===4){
    const recap = renderWeeklyRecap();
    if(recap) content.appendChild(recap);
    else content.appendChild(h("div",{class:"empty"},
      h("div",{style:{marginBottom:"12px"}},"No recap available yet"),
      h("div",{style:{fontSize:"13px",color:"var(--faint)"}},"The weekly recap is generated every Sunday after snapshots are taken. Check back after the next raid week!")
    ));
  }
  app.appendChild(content);
  app.appendChild(h("div",{class:"footer"},"RFB HUB \u00b7 LIVE VIA RAIDER.IO"));
}
render();loadAll();
